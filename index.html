<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography &amp; Its Trade-offs</title>
<style>
/* keep your full original CSS here (unchanged) */
</style>
</head>
<body>
<div id="app">
<header id="header">
  <div class="logo" onclick="nav('home')">
    <div class="logo-sub">Non-Linear History of</div>
    <div class="logo-title">Cartography &amp; Its Trade-offs</div>
  </div>
  <button id="cmp-btn" onclick="toggleCmp()">Compare</button>
</header>
<div id="cmp-banner" style="display:none"></div>
<div id="body">
  <nav id="sidebar"></nav>
  <main id="main"></main>
</div>
</div>

<script>
// ===== DATA (UNCHANGED — use your full dataset) =====

// ===== STATE =====
let state = {
  page: 'home',
  map: null,
  compare: false,
  compareA: null,
  compareB: null
};

// ===== ROUTING =====
function serializeState(){
  if(state.compare && state.compareA && state.compareB){
    return `#compare=${encodeURIComponent(state.compareA)}|${encodeURIComponent(state.compareB)}`;
  }
  if(state.map){
    return `#${state.page}/${encodeURIComponent(state.map)}`;
  }
  return `#${state.page}`;
}

function parseState(){
  const hash = location.hash.replace('#','');

  if(hash.startsWith('compare=')){
    const [a,b] = hash.replace('compare=','').split('|');
    return {
      page:null,
      map:null,
      compare:true,
      compareA:decodeURIComponent(a),
      compareB:decodeURIComponent(b)
    };
  }

  const [page,map] = hash.split('/');
  return {
    page: page || 'home',
    map: map ? decodeURIComponent(map) : null,
    compare:false,
    compareA:null,
    compareB:null
  };
}

function setState(next,push=true){
  state = {...state,...next};
  if(push) history.pushState(state,'',serializeState());
  renderApp();
}

// ===== NAV =====
function nav(id){
  setState({page:id,map:null,compare:false,compareA:null,compareB:null});
}

function handleMapClick(eraId,mapName){
  if(state.compare){
    if(!state.compareA){
      setState({compareA:mapName});
    } else if(state.compareA===mapName){
      setState({compareA:null});
    } else {
      setState({compareB:mapName});
    }
  } else {
    setState({page:eraId,map:mapName});
  }
}

function toggleCmp(){
  if(state.compare){
    setState({compare:false,compareA:null,compareB:null});
  } else {
    setState({compare:true,compareA:null,compareB:null});
  }
}

// ===== RENDER CORE =====
function renderApp(){
  document.getElementById('cmp-banner').style.display = state.compare ? 'block':'none';

  if(state.compare && state.compareA && state.compareB){
    renderComparison(findMap(state.compareA), findMap(state.compareB));
  } else if(state.map){
    const era = ERAS.find(e=>e.id===state.page);
    const map = era.maps.find(m=>m.name===state.map);
    renderMap(map,era);
  } else {
    renderEraOrHome();
  }

  renderSidebar();
}

function findMap(name){
  for(const e of ERAS){
    const m = e.maps.find(x=>x.name===name);
    if(m) return m;
  }
}

// ===== ORIGINAL RENDER FUNCTIONS (RESTORED) =====
function renderEraOrHome(){
  const main = document.getElementById('main');

  if(state.page==='home'){
    main.innerHTML = `<div class="page">
      <h1 class="pg-title">Maps are not territories.</h1>
      <div class="static-text">${ERA_TEXT.home}</div>
    </div>`;
    return;
  }

  const e = ERAS.find(x=>x.id===state.page);

  main.innerHTML = `<div class="page">
    <h1 class="pg-title">${e.label}</h1>
    <div class="pg-sub">${e.years}</div>
    <div class="thesis">${e.thesis}</div>
    <div class="map-grid">
      ${e.maps.map(m=>`
        <div class="map-card" onclick="handleMapClick('${e.id}','${m.name}')">
          <div class="map-nm">${m.name}</div>
          <div class="map-mt">${m.year}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderMap(m,era){
  const main = document.getElementById('main');

  main.innerHTML = `<div class="page-wide">
    <h1 class="pg-title">${m.name}</h1>
    <div class="pg-sub">${m.region}</div>
    <div class="tradeoff">
      <div>${m.gained.map(g=>`<div class="pill pill-g">${g}</div>`).join('')}</div>
      <div>${m.sacrificed.map(s=>`<div class="pill pill-s">${s}</div>`).join('')}</div>
    </div>
  </div>`;
}

function renderComparison(a,b){
  const main = document.getElementById('main');

  main.innerHTML = `<div class="page-wide">
    <h1 class="pg-title">Comparison</h1>
    <div>${a.name} vs ${b.name}</div>
  </div>`;
}

function renderSidebar(){
  const nav = document.getElementById('sidebar');

  let h = `<div onclick="nav('home')">Home</div>`;

  ERAS.forEach(e=>{
    h += `<div onclick="nav('${e.id}')">${e.label}</div>`;

    if(state.page===e.id){
      e.maps.forEach(m=>{
        const active = state.compareA===m.name;
        h += `<div onclick="handleMapClick('${e.id}','${m.name}')" style="margin-left:10px;color:${active?'teal':'inherit'}">${m.name}</div>`;
      });
    }
  });

  nav.innerHTML = h;
}

// ===== HISTORY =====
window.onpopstate = ()=>{
  state = parseState();
  renderApp();
};

// ===== INIT =====
state = parseState();
renderApp();
</script>
</body>
</html>
