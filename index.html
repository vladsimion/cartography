<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartography &amp; Its Trade-offs</title>
  <style>
    :root{--bg:#0A0806;--bg-card:#0E0B07;--border:#1E1A12;--border-mid:#2A2418;--text:#E0D0A8;--muted:#A09060;--faint:#6A5830;--vfaint:#3A2E18;--gold:#C8A96E;--green:#88BB78;--red:#CC7755;--teal:#5AABAB;--font:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;--r:2px;--t:0.15s ease}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    button{cursor:pointer;font-family:inherit;background:none;border:none}
    #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    #header{padding:1.2rem 1.8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    #axis-strip{padding:.45rem 1.8rem;border-bottom:1px solid var(--border);display:flex;gap:.2rem;flex-wrap:wrap;align-items:center;flex-shrink:0}
    #body{display:flex;flex:1;min-height:0}
    #sidebar{width:280px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
    #main{flex:1;overflow-y:auto;padding:2.2rem}
    .btn{display:inline-flex;align-items:center;padding:.35rem .9rem;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;border:1px solid currentColor;color:var(--teal)}
    .ax-btn{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .4rem;color:var(--faint);transition:all var(--t)}
    .ax-btn:hover, .ax-btn.active{color:var(--gold)}
    #def-panel{background:#0D0B07;border-bottom:1px solid var(--border-mid);padding:1rem 1.8rem;display:none}
    .era-row{padding:.8rem 1.2rem;cursor:pointer;border-left:3px solid transparent}
    .era-row.active{background:rgba(200,169,110,.08);border-left-color:var(--gold)}
    .map-row{padding:.5rem 1.2rem .5rem 1.7rem;cursor:pointer;border-bottom:1px solid #0E0A06}
    .map-row.active{background:rgba(200,169,110,.1)}
    .ax-dots{display:flex;gap:3px}
    .adot{width:9px;height:9px;border-radius:1px;background:var(--vfaint)}
    .adot.on{background:var(--gold)}
    .pill{display:inline-flex;padding:.28rem .6rem;font-size:.68rem;border-radius:var(--r);margin-right:.3rem}
    .pill-g{background:#1A2A18;color:var(--green);border:1px solid #3A5A30}
    .pill-s{background:#2A1A18;color:var(--red);border:1px solid #5A3020}
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo" onclick="nav('home')">
      <div style="font-size:.58rem;color:var(--vfaint)">Non-Linear History of</div>
      <div style="font-size:1.5rem">Cartography &amp; Its Trade-offs</div>
    </div>
    <button class="btn" onclick="toggleCmp()">⇄ Compare</button>
  </header>
  <div id="axis-strip"></div>
  <div id="def-panel"></div>
  <div id="body">
    <nav id="sidebar"></nav>
    <main id="main"></main>
  </div>
</div>

<script>
const AXES = [
  { id: "accuracy", label: "Accuracy" },
  { id: "usability", label: "Usability" },
  { id: "navigation", label: "Navigation" },
  { id: "symbolism", label: "Symbolism" },
  { id: "politics", label: "Politics" },
  { id: "completeness",label: "Completeness" },
  { id: "richness", label: "Richness" }
];

const AXIS_DEFS = {
  accuracy: "Geometric precision and spatial truth. High accuracy means the map reflects real-world coordinates and distances.",
  usability: "How easily a person can read and interpret the map for its intended purpose.",
  navigation: "The utility of the map for getting from Point A to Point B.",
  symbolism: "The depth of meaning, religious framing, or artistic representation within the map.",
  politics: "The degree to which the map asserts power, claims territory, or centers a specific worldview.",
  completeness: "The total geographic area or amount of information covered.",
  richness: "The density of detail, annotations, and cultural information provided."
};

const ERAS = [
  {
    id: "ancient", label: "Ancient", years: "6200 BCE – 400 CE",
    maps: [
      { name: "Babylonian World Map", year: "c. 600 BCE", region: "Mesopotamia", gained: ["Cosmological framing"], sacrificed: ["Geometric accuracy"], axes: { accuracy: 1, usability: 2, navigation: 1, symbolism: 5, politics: 5, completeness: 1, richness: 3 } },
      { name: "Ptolemy's World Map", year: "c. 150 CE", region: "Roman Egypt", gained: ["Coordinate system"], sacrificed: ["Navigational readability"], axes: { accuracy: 4, usability: 2, navigation: 2, symbolism: 2, politics: 3, completeness: 3, richness: 2 } }
    ]
  },
  {
    id: "modern", label: "Modern", years: "1800 – 1970 CE",
    maps: [
      { name: "Beck's London Underground Map", year: "1933", region: "England", gained: ["Topological clarity"], sacrificed: ["Geographic truth"], axes: { accuracy: 1, usability: 5, navigation: 5, symbolism: 3, politics: 1, completeness: 2, richness: 2 } },
      { name: "Peters Projection", year: "1973", region: "Germany", gained: ["Equal-area representation"], sacrificed: ["Shape accuracy"], axes: { accuracy: 3, usability: 2, navigation: 1, symbolism: 4, politics: 5, completeness: 4, richness: 2 } }
    ]
  },
  {
    id: "digital", label: "Digital Era", years: "1970 – Present",
    maps: [
      { name: "Google Maps", year: "2005–present", region: "Global", gained: ["Real-time navigation"], sacrificed: ["Spatial memory"], axes: { accuracy: 5, usability: 5, navigation: 5, symbolism: 1, politics: 4, completeness: 4, richness: 2 } },
      { name: "OpenStreetMap", year: "2004–present", region: "Global", gained: ["Community-built commons"], sacrificed: ["Editorial consistency"], axes: { accuracy: 4, usability: 3, navigation: 4, symbolism: 1, politics: 2, completeness: 5, richness: 4 } }
    ]
  }
];

let currentEra = 'ancient';
let currentMap = null;

function init() {
  const strip = document.getElementById('axis-strip');
  strip.innerHTML = '<span style="font-size:.58rem; color:var(--vfaint); margin-right:.5rem">DEFINITIONS:</span>' + 
    AXES.map(a => `<button class="ax-btn" onclick="showDef('${a.id}')">${a.label}</button>`).join('');
  renderSidebar();
  nav('home');
}

function showDef(id) {
  const panel = document.getElementById('def-panel');
  panel.style.display = 'block';
  panel.innerHTML = `<div style="font-size:.6rem; color:var(--gold); margin-bottom:.5rem">${id.toUpperCase()}</div>
                     <div style="font-size:.8rem; color:var(--muted)">${AXIS_DEFS[id]}</div>
                     <button onclick="this.parentElement.style.display='none'" style="color:var(--faint); font-size:.6rem; margin-top:1rem">Close [x]</button>`;
}

function renderSidebar() {
  const side = document.getElementById('sidebar');
  side.innerHTML = ERAS.map(era => `
    <div class="era-row ${currentEra === era.id ? 'active' : ''}" onclick="currentEra='${era.id}'; renderSidebar()">
      <div style="font-size:.7rem">${era.label}</div>
      <div style="font-size:.55rem; color:var(--vfaint)">${era.years}</div>
    </div>
    ${currentEra === era.id ? era.maps.map(m => `
      <div class="map-row" onclick="renderMap('${era.id}', '${m.name}')">
        <div style="font-size:.7rem">${m.name}</div>
      </div>
    `).join('') : ''}
  `).join('');
}

function renderMap(eraId, mapName) {
  const era = ERAS.find(e => e.id === eraId);
  const map = era.maps.find(m => m.name === mapName);
  const main = document.getElementById('main');
  
  let h = `<h1 style="font-size:2rem; margin-bottom:.5rem">${map.name}</h1>
           <p style="color:var(--vfaint); margin-bottom:1.5rem">${map.year} | ${map.region}</p>
           <div style="display:flex; gap:2rem; margin-bottom:2rem">
             <div style="flex:1">
               <h3 style="font-size:.6rem; color:var(--gold); margin-bottom:.5rem">TRADE-OFFS</h3>
               ${map.gained.map(g => `<span class="pill pill-g">+ ${g}</span>`).join('')}
               ${map.sacrificed.map(s => `<span class="pill pill-s">- ${s}</span>`).join('')}
             </div>
             <div style="flex:1">
               <h3 style="font-size:.6rem; color:var(--gold); margin-bottom:.5rem">AXIS SCORES</h3>
               ${AXES.map(a => `
                 <div style="display:flex; justify-content:space-between; margin-bottom:.3rem">
                   <span style="font-size:.6rem; color:var(--faint)">${a.label}</span>
                   <div class="ax-dots">${[1,2,3,4,5].map(v => `<div class="adot ${v <= map.axes[a.id] ? 'on' : ''}"></div>`).join('')}</div>
                 </div>
               `).join('')}
             </div>
           </div>`;
  main.innerHTML = h;
}

function nav(page) {
  if(page === 'home') {
    document.getElementById('main').innerHTML = `<h1>Select a map to begin.</h1><p style="color:var(--muted)">Explore the shifting trade-offs of cartography through 39 historical landmarks.</p>`;
  }
}

init();
</script>
</body>
</html>
