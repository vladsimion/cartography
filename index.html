<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartography &amp; Its Trade-offs</title>
  <meta name="description" content="A non-linear history of cartography — 39 maps, 7 eras, and the trade-offs that shaped how humanity understood the world." />
  <style>
    :root{--bg:#0A0806;--bg-card:#0E0B07;--border:#1E1A12;--border-mid:#2A2418;--text:#E0D0A8;--muted:#A09060;--faint:#6A5830;--vfaint:#3A2E18;--gold:#C8A96E;--green:#88BB78;--red:#CC7755;--teal:#5AABAB;--font:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;--r:2px;--t:0.15s ease}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
    button{cursor:pointer;font-family:inherit;background:none;border:none}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
    #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    #header{padding:1.2rem 1.8rem 0.9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;flex-shrink:0;background:var(--bg);position:sticky;top:0;z-index:100}
    #axis-strip{padding:.45rem 1.8rem;border-bottom:1px solid var(--border);display:flex;gap:.2rem;flex-wrap:wrap;align-items:center;flex-shrink:0}
    #cmp-banner{padding:.55rem 1.8rem;background:#0D1A1A;border-bottom:1px solid #1A3030;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;flex-shrink:0;animation:slideDown .2s ease}
    #body{display:flex;flex:1;min-height:0}
    #sidebar{width:280px;min-width:220px;max-width:320px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
    #main{flex:1;overflow-y:auto;padding:2.2rem 2.2rem 4rem}
    .logo{cursor:pointer}.logo-sub{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--vfaint);margin-bottom:.2rem}
    .logo-title{font-size:clamp(1rem,2.5vw,1.5rem);font-weight:normal;letter-spacing:.05em}
    .btn{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .9rem;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;border-radius:var(--r);border:1px solid currentColor;transition:background var(--t),color var(--t);white-space:nowrap}
    .btn-teal{color:var(--teal)}.btn-teal.active{background:var(--teal);color:var(--bg)}
    .btn-ghost{color:var(--faint);border-color:var(--border-mid)}.btn-ghost:hover{color:var(--muted)}
    .btn:disabled{opacity:.35;cursor:default}
    .ax-lbl{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--vfaint);margin-right:.4rem}
    .ax-btn{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .4rem;color:var(--faint);border-bottom:1px solid transparent;transition:all var(--t)}.ax-btn.active{color:var(--text);border-bottom:1px solid var(--gold)}
    .ax-help{font-size:.52rem;color:var(--vfaint);padding:.1rem .18rem;transition:color var(--t)}.ax-help.open,.ax-help:hover{color:var(--gold)}
    #def-panel{background:#0D0B07;border-bottom:1px solid var(--border-mid);padding:1rem 1.8rem;animation:slideDown .2s ease;flex-shrink:0}
    .def-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.2rem;max-width:860px}
    .def-what{grid-column:1/3}.def-label{font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem}
    .def-p{font-size:.76rem;color:var(--muted);line-height:1.7;margin-bottom:.5rem}
    .def-tension{padding:.6rem .8rem;background:var(--bg-card);border:1px solid var(--border);border-left:2px solid var(--red);border-radius:var(--r)}
    .def-tl{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:.2rem}
    .def-tp{font-size:.71rem;color:#8A7040;line-height:1.6}
    .rub-row{display:flex;gap:.5rem;margin-bottom:.4rem;align-items:flex-start}
    .rub-dots{display:flex;gap:2px;flex-shrink:0;padding-top:2px}
    .rdot{width:5px;height:5px;border-radius:1px}
    .rub-txt{font-size:.61rem;color:var(--faint);line-height:1.4}.rub-lbl{color:var(--gold)}
    .era-row{padding:.8rem 1.2rem;cursor:pointer;border-left:3px solid transparent;transition:background var(--t)}
    .era-row.active{border-left-color:var(--era-hue,var(--gold));background:rgba(200,169,110,.08)}
    .era-tag{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase}
    .era-yrs{font-size:.63rem;color:var(--vfaint);font-style:italic;margin-top:.1rem}
    .era-th{font-size:.66rem;color:#8A7848;margin-top:.3rem;line-height:1.4}
    .era-ct{font-size:.56rem;color:var(--vfaint)}
    .map-row{padding:.5rem 1.2rem .5rem 1.7rem;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid #0E0A06;display:flex;justify-content:space-between;align-items:flex-start;transition:background var(--t)}
    .map-row.active{border-left-color:var(--era-hue,var(--gold));background:rgba(200,169,110,.1)}
    .map-row.cmp-a{border-left-color:var(--teal)}
    .map-nm{font-size:.71rem;color:var(--text);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:185px}
    .map-mt{font-size:.58rem;color:var(--vfaint);margin-top:.12rem}
    .cmp-badge{font-size:.5rem;background:var(--teal);color:var(--bg);padding:0 .28rem;border-radius:1px}
    .ax-sc{font-size:.6rem;font-weight:bold}
    .connector{margin-left:1.4rem;height:.5rem;border-left:1px dashed var(--border)}
    .page{animation:fadeIn .22s ease;max-width:700px}
    .page-wide{animation:fadeIn .22s ease;max-width:760px}
    .pg-lbl{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin-bottom:.38rem}
    .pg-title{font-weight:normal;font-size:1.65rem;color:var(--text);margin-bottom:.2rem}
    .pg-sub{font-size:.73rem;color:var(--vfaint);font-style:italic;margin-bottom:1.2rem}
    .thesis{font-size:.8rem;color:var(--faint);line-height:1.75;font-style:italic;border-left:2px solid rgba(200,169,110,.25);padding-left:.85rem;margin-bottom:1.1rem}
    .divider{height:1px;background:linear-gradient(to right,rgba(200,169,110,.4),transparent);margin:1.4rem 0}
    .tradeoff{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:1.1rem}
    .to-col{flex:1;min-width:170px}
    .to-lbl{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.4rem}
    .pill{display:inline-flex;align-items:flex-start;gap:.3rem;padding:.28rem .6rem;font-size:.68rem;line-height:1.4;border-radius:var(--r);margin:0 .3rem .3rem 0}
    .pill-g{background:#1A2A18;border:1px solid #3A5A30;color:var(--green)}
    .pill-s{background:#2A1A18;border:1px solid #5A3020;color:var(--red)}
    .radar-wrap{display:flex;gap:1.8rem;align-items:flex-start;margin-bottom:1.4rem;flex-wrap:wrap}
    .axes-list{flex:1;min-width:200px}
    .ax-row{display:flex;align-items:center;gap:.55rem;margin-bottom:.42rem}
    .ax-nb{font-size:.58rem;color:var(--faint);width:86px;text-align:right;padding:0;transition:color var(--t);cursor:pointer;letter-spacing:.04em}
    .ax-nb.open,.ax-nb:hover{color:var(--gold);text-decoration:underline}
    .ax-dots{display:flex;gap:3px}
    .adot{width:9px;height:9px;border-radius:1px}
    .ax-hint{font-size:.56rem;color:var(--vfaint);font-style:italic;margin-top:.3rem}
    .inline-def{background:#0D0B07;border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1rem;animation:slideDown .18s ease}
    .idef-lbl{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.28rem}
    .idef-p{font-size:.72rem;color:var(--muted);line-height:1.65;margin-bottom:.4rem}
    .idef-ten{font-size:.68rem;color:var(--faint);font-style:italic;line-height:1.55;margin-bottom:.4rem}
    .idef-rub{display:flex;gap:.6rem;flex-wrap:wrap}
    .idef-ri{font-size:.58rem;color:var(--faint)}.idef-rs{color:var(--gold)}
    .static-text{line-height:1.85;color:var(--muted);font-size:.88rem}
    .static-text p{margin-bottom:1.1rem}
    .era-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:2rem}
    .era-card{background:var(--bg-card);padding:1rem 1.1rem;cursor:pointer;transition:background var(--t)}
    .ten-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:1.8rem}
    .ten-cell{background:var(--bg-card);padding:.8rem 1rem}
    .t-g{font-size:.61rem;color:var(--green)}.t-l{font-size:.61rem;color:var(--red)}.t-ex{font-size:.64rem;color:var(--vfaint);font-style:italic;margin-top:.22rem}
    .map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin-top:.5rem}
    .map-card{background:var(--bg-card);padding:.9rem 1rem;cursor:pointer;transition:background var(--t);border-left:2px solid transparent}
    .cmp-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.3rem}
    .cmp-card{padding:1.1rem;border-radius:var(--r)}
    .dp{font-size:.58rem;color:var(--green)}.dn{font-size:.58rem;color:var(--red)}
    .nav-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--border)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
    @media(max-width:680px){
      #sidebar{display:none}
      #sidebar.mob-open{display:block;position:fixed;top:0;left:0;width:80vw;height:100vh;z-index:200;box-shadow:4px 0 20px rgba(0,0,0,.7)}
      #mob-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
      #mob-bd.show{display:block}
      #main{padding:1.4rem 1.2rem 3rem}
      .def-grid{grid-template-columns:1fr}.def-what{grid-column:1/2}
      .cmp-cards{grid-template-columns:1fr}
    }
    @media(min-width:681px){#mob-btn{display:none!important}}
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo" onclick="nav('home')">
      <div class="logo-sub">Non-Linear History of</div>
      <div class="logo-title">Cartography &amp; Its Trade-offs</div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
      <span id="cmp-status" style="font-size:.62rem;color:var(--teal);display:none"></span>
      <button class="btn btn-teal" id="cmp-btn" onclick="toggleCmp()">&#8644; Compare</button>
      <button class="btn btn-ghost" id="mob-btn" onclick="toggleMob()">&#9776;</button>
    </div>
  </header>
  <div id="axis-strip"></div>
  <div id="def-panel" style="display:none"></div>
  <div id="cmp-banner" style="display:none">
    <span style="font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal)">Compare mode</span>
    <span id="cmp-msg" style="font-size:.76rem;color:#6AABAB"></span>
    <button class="btn btn-ghost" onclick="toggleCmp()" style="margin-left:auto;font-size:.58rem">Cancel</button>
  </div>
  <div id="body">
    <nav id="sidebar"></nav>
    <div id="mob-bd" onclick="toggleMob()"></div>
    <main id="main"></main>
  </div>
</div>
<script>
const AXES = [
  { id: "accuracy",    label: "Accuracy",     icon: "◎" },
  { id: "usability",   label: "Usability",    icon: "◈" },
  { id: "navigation",  label: "Navigation",   icon: "◇" },
  { id: "symbolism",   label: "Symbolism",    icon: "◉" },
  { id: "politics",    label: "Politics",     icon: "◆" },
  { id: "completeness",label: "Completeness", icon: "○" },
  { id: "richness",    label: "Richness",     icon: "◐" },
];

const ERAS = [
  {
    id: "ancient", label: "Ancient", years: "6200 BCE – 400 CE", hue: "#C8A96E",
    thesis: "The first maps were not tools of navigation — they were tools of ownership, cosmology, and power. Precision was irrelevant; claim was everything.",
    gained: ["Conceptual framework for representing space", "Mathematical projection (Ptolemy)", "Political assertion of territorial ownership"],
    sacrificed: ["Local ecological knowledge", "Oral geographic tradition", "Navigational practicality"],
    maps: [
      {
        name: "Çatalhöyük Wall Painting", year: "c. 6200 BCE", region: "Anatolia",
        gained: ["Oldest known spatial representation of settlement and landscape", "Integration of human settlement with volcanic topography", "Pictorial convention for representing place"],
        sacrificed: ["Scale or distance accuracy", "Any navigational utility", "Portability or reproducibility"],
        axes: { accuracy: 1, usability: 2, navigation: 1, symbolism: 5, politics: 2, completeness: 1, richness: 4 },
      },
      {
        name: "Babylonian World Map (Imago Mundi)", year: "c. 600 BCE", region: "Mesopotamia",
        gained: ["First known schematic world map", "Explicit cosmological and mythological framing", "Written cuneiform annotations naming distant regions"],
        sacrificed: ["All geographic accuracy beyond Mesopotamia", "Navigational utility", "Non-Babylonian geographic worldviews"],
        axes: { accuracy: 1, usability: 2, navigation: 1, symbolism: 5, politics: 5, completeness: 1, richness: 3 },
      },
      {
        name: "Anaximander's World Map", year: "c. 550 BCE", region: "Greece",
        gained: ["First Greek world map — the prototype of Western cosmological mapping", "Ocean-ringed circular disc that framed all European cartography for a millennium", "Separated geography from mythology as an intellectual discipline"],
        sacrificed: ["All geographic accuracy", "Any coverage beyond the Mediterranean and Near East", "Navigational utility of any kind"],
        axes: { accuracy: 1, usability: 1, navigation: 1, symbolism: 5, politics: 2, completeness: 1, richness: 3 },
      },
      {
        name: "Eratosthenes' World Map", year: "c. 194 BCE", region: "Alexandria",
        gained: ["First map based on a calculated Earth circumference — accurate to within 2%", "Grid of parallels and meridians grounded in astronomical observation", "Correct proportions of the known world — better than Ptolemy in some regions"],
        sacrificed: ["Coverage beyond the Mediterranean and Near East", "Navigational readability for sailors", "Survival — known only through later descriptions"],
        axes: { accuracy: 4, usability: 2, navigation: 2, symbolism: 1, politics: 1, completeness: 2, richness: 2 },
      },
      {
        name: "Tabula Peutingeriana", year: "c. 300 CE (medieval copy)", region: "Roman Empire",
        gained: ["Comprehensive road network of the entire Roman Empire", "Distances between stations annotated throughout", "Practical itinerary tool for administration and military"],
        sacrificed: ["Geographic shape (extremely elongated east-west to fit a scroll)", "Any spatial accuracy of landmasses", "Non-Roman territories and peoples"],
        axes: { accuracy: 2, usability: 5, navigation: 5, symbolism: 3, politics: 5, completeness: 4, richness: 3 },
      },
      {
        name: "Ptolemy's World Map", year: "c. 150 CE", region: "Roman Egypt",
        gained: ["Systematic latitude/longitude coordinate system", "Conical and spherical projection theory", "Reproducible framework — locations given as coordinates"],
        sacrificed: ["Navigational readability for sailors", "Accuracy east of Persia and in sub-Saharan Africa", "Enclosed Indian Ocean (a damaging error repeated for centuries)"],
        axes: { accuracy: 4, usability: 2, navigation: 2, symbolism: 2, politics: 3, completeness: 3, richness: 2 },
      },
    ],
  },
  {
    id: "medieval", label: "Medieval", years: "400 – 1450 CE", hue: "#7B9E6B",
    thesis: "Medieval maps were not failed attempts at accuracy — they were successful cosmologies. The world was mapped as it meant, not as it measured.",
    gained: ["Moral and theological layering of geography", "Integration of time, history, and myth into space", "Encyclopedic annotation density unmatched before or since"],
    sacrificed: ["Ptolemaic coordinate precision (deliberately set aside)", "Navigational usefulness for most maps", "Geometric consistency"],
    maps: [
      {
        name: "T-O Map (Isidore of Seville)", year: "c. 600–1300 CE", region: "Europe",
        gained: ["Simplest and most politically powerful diagram in cartographic history", "Three strokes dividing the world into Asia (top), Europe (left), Africa (right)", "Template for all European medieval world maps — reproduced thousands of times"],
        sacrificed: ["All geographic accuracy", "Any navigational function", "Non-Christian and non-European worldviews"],
        axes: { accuracy: 1, usability: 3, navigation: 1, symbolism: 5, politics: 5, completeness: 2, richness: 2 },
      },
      {
        name: "Al-Balkhi School Maps (KMMS)", year: "c. 900–1000 CE", region: "Islamic World",
        gained: ["World mapped by political and religious boundaries, not geography", "Abstract geometric forms — squares, circles, straight lines — for rivers and coasts", "Deliberately prioritised Muslim administrative reality over physical space"],
        sacrificed: ["Geographic accuracy entirely — consciously rejected", "Non-Muslim territories (shown as blank or marginal)", "Coverage of Europe, sub-Saharan Africa, East Asia"],
        axes: { accuracy: 1, usability: 4, navigation: 3, symbolism: 5, politics: 5, completeness: 2, richness: 3 },
      },
      {
        name: "Al-Idrisi's Tabula Rogeriana", year: "1154 CE", region: "Sicily / Islamic World",
        gained: ["Most geographically accurate world map of its era", "Synthesis of Greek, Arab, Persian, and traveler knowledge", "South-oriented layout that challenged European convention"],
        sacrificed: ["Christian cosmological framing", "Accurate sub-Saharan Africa and Pacific coverage", "Widespread adoption — largely unknown in Europe for centuries"],
        axes: { accuracy: 4, usability: 3, navigation: 3, symbolism: 3, politics: 3, completeness: 3, richness: 4 },
      },
      {
        name: "Hereford Mappa Mundi", year: "c. 1300 CE", region: "England",
        gained: ["700+ annotated places combining geography, history, and scripture", "Jerusalem as the spiritual and geometric center of the world", "Visual encyclopedia of the known world in a single image"],
        sacrificed: ["Geographic accuracy", "Any navigational function", "Non-Christian geographic worldviews and peoples"],
        axes: { accuracy: 1, usability: 1, navigation: 1, symbolism: 5, politics: 4, completeness: 4, richness: 5 },
      },
      {
        name: "Ebstorf Map", year: "c. 1234 CE (destroyed 1943)", region: "Germany",
        gained: ["Largest medieval mappa mundi ever made (3.6m × 3.6m)", "Christ's body literally framing the world — head, hands, feet at the margins", "Over 1,500 place annotations, illustrations, and legends"],
        sacrificed: ["Geographic accuracy entirely", "Portability or practical use", "Survival — destroyed in WWII bombing"],
        axes: { accuracy: 1, usability: 1, navigation: 1, symbolism: 5, politics: 3, completeness: 5, richness: 5 },
      },
      {
        name: "Portolan Charts", year: "c. 1275–1500 CE", region: "Mediterranean",
        gained: ["Highly accurate Mediterranean and Black Sea coastlines", "Dense network of rhumb lines for compass bearing navigation", "Practical utility for sailors — the first 'working' maps"],
        sacrificed: ["Interior land detail entirely", "Cosmological or narrative meaning", "Coverage beyond known sailing routes"],
        axes: { accuracy: 4, usability: 5, navigation: 5, symbolism: 1, politics: 2, completeness: 2, richness: 2 },
      },
      {
        name: "Fra Mauro World Map", year: "c. 1450 CE", region: "Venice",
        gained: ["Most geographically ambitious pre-Columbian European world map", "Africa shown as circumnavigable — anticipating Dias by 40 years", "Synthesis of Ptolemy, Arab geography, Marco Polo, and merchant reports"],
        sacrificed: ["Ptolemaic coordinate system (rejected deliberately)", "Consistent scale across regions", "The enclosed Indian Ocean error — Fra Mauro correctly rejected it"],
        axes: { accuracy: 4, usability: 2, navigation: 3, symbolism: 4, politics: 3, completeness: 5, richness: 5 },
      },
    ],
  },
  {
    id: "eastasian", label: "East Asian & Pacific", years: "1300 – 1700 CE", hue: "#C47A7A",
    thesis: "While Europe was rediscovering Ptolemy, China and Korea were making world maps of comparable or greater scope — and Pacific islanders were encoding oceanic knowledge in forms Europeans couldn't recognise as maps at all.",
    gained: ["Non-Eurocentric world maps of extraordinary completeness", "Tactile and embodied navigation knowledge (Pacific)", "Integration of Islamic, Chinese, and indigenous geographic traditions"],
    sacrificed: ["Global influence — none of these traditions shaped the cartographic mainstream", "Survival in many cases — Chinese maps were rarely preserved as prestige objects", "Recognition — Western scholarship ignored these traditions for centuries"],
    maps: [
      {
        name: "Da Ming Hunyi Tu", year: "1389", region: "China",
        gained: ["One of the oldest surviving East Asian world maps", "Shows Africa, Europe, and the Middle East — before European contact with most of these regions", "China correctly scaled as the dominant landmass at centre"],
        sacrificed: ["Accuracy of Africa and Europe (highly distorted)", "Coverage of the Americas (unknown)", "Western adoption — it circulated only within the Chinese imperial tradition"],
        axes: { accuracy: 3, usability: 2, navigation: 2, symbolism: 4, politics: 5, completeness: 4, richness: 4 },
      },
      {
        name: "Kangnido Map", year: "1402", region: "Korea",
        gained: ["First Korean world map — synthesises Chinese, Islamic, and Korean geographic sources", "Shows Africa as a peninsula 90 years before Dias rounded the Cape", "Predates European cartographic knowledge of the same regions by decades"],
        sacrificed: ["The Americas (entirely absent)", "Consistent scale — Korea is dramatically oversized", "Western cartographic influence — developed entirely independently"],
        axes: { accuracy: 3, usability: 2, navigation: 2, symbolism: 3, politics: 4, completeness: 4, richness: 4 },
      },
      {
        name: "Zheng He / Mao Kun Chart", year: "c. 1430", region: "China",
        gained: ["Nautical chart of the largest maritime expeditions in pre-modern history", "Routes from China to East Africa, Arabia, and Southeast Asia", "Proof that ocean exploration does not require or produce European-style cartography"],
        sacrificed: ["Accurate coastal shapes (strip-chart format, not spatial)", "The Americas — Zheng He never reached them", "Global influence — China turned inward; the charts were suppressed"],
        axes: { accuracy: 3, usability: 4, navigation: 5, symbolism: 2, politics: 4, completeness: 3, richness: 3 },
      },
      {
        name: "Marshall Islands Stick Charts", year: "Pre-colonial – present", region: "Micronesia / Pacific",
        gained: ["Encodes ocean swell patterns, island positions, and wave deflection — information invisible to European sailors", "Navigation by feel, not sight — a wholly different epistemology of space", "Still in use and transmitted as living knowledge"],
        sacrificed: ["Visual representation entirely — these are tactile, not pictorial", "Any geographic accuracy in the European sense", "Recognition as 'maps' by Western cartographic tradition until the 20th century"],
        axes: { accuracy: 2, usability: 5, navigation: 5, symbolism: 5, politics: 1, completeness: 2, richness: 5 },
      },
      {
        name: "Matteo Ricci's Kunyu Wanguo Quantu", year: "1602", region: "China / Jesuit",
        gained: ["First European-style world map in Chinese — showing the Americas to a Chinese audience", "Placed China near the centre, bridging European projection with Chinese cosmological expectation", "Synthesis of two entirely separate cartographic civilisations in a single object"],
        sacrificed: ["Pure Ptolemaic projection — deliberately modified to not offend Chinese cosmology", "Consistent treatment of scale across continents", "Broad circulation — printed in limited copies, suppressed after Ricci's death"],
        axes: { accuracy: 4, usability: 3, navigation: 2, symbolism: 5, politics: 5, completeness: 4, richness: 4 },
      },
    ],

const ERA_TEXT = {
  home: "The history of cartography is not a straight line of progress toward 'perfection.' It is a story of trade-offs. To gain accuracy, we sacrifice symbolism. To gain usability, we sacrifice geographic truth. This tool explores 39 maps across 7 eras, plotting them against seven fundamental axes of cartographic value.",
  ancient: "The earliest maps were not attempts to represent the world as it was — they were attempts to claim it, order it, and make it meaningful.",
  medieval: "Medieval maps were successful cosmologies. They mapped the world as it meant, not as it measured.",
  eastasian: "While Europe rediscovered Ptolemy, East Asian traditions built world maps of extraordinary scope and different priorities.",
  renaissance: "Renaissance cartography advanced imperial power and scientific accuracy in inseparable lockstep.",
  scientific: "The Scientific Age replaced honest blank spaces with precise geometries, often at the cost of local ecological knowledge.",
  modern: "Modern mapping split into industrial precision for states and radical simplification for the public.",
  digital: "The digital era gives us real-time global accuracy but at the cost of spatial memory and privacy."
};

const MAP_TEXT = {}; // Optional: populate with map-specific descriptions if needed

let curPage = 'home', cmpA = null, isCmp = false;

function esc(t){ return (t||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderSidebar() {
  const nav = document.getElementById('sidebar');
  let h = `<div class="era-row ${curPage==='home'?'active':''}" onclick="nav('home')">
    <div class="era-tag">Introduction</div>
  </div>`;
  ERAS.forEach(e => {
    h += `<div class="era-row ${curPage===e.id?'active':''}" onclick="nav('${e.id}')" style="--era-hue:${e.hue}">
      <div class="era-tag" style="color:${e.hue}">${e.label}</div>
      <div class="era-yrs">${e.years}</div>
    </div>`;
    if (curPage === e.id) {
      e.maps.forEach(m => {
        const isA = cmpA && cmpA.name === m.name;
        h += `<div class="map-row ${isA?'cmp-a':''}" onclick="handleMapClick('${e.id}','${m.name}')">
          <div>
            <div class="map-nm">${esc(m.name)}</div>
            <div class="map-mt">${m.year} • ${m.region}</div>
          </div>
          ${isA?'<span class="cmp-badge">A</span>':''}
        </div>`;
      });
    }
  });
  nav.innerHTML = h;
}

function handleMapClick(eraId, mapName) {
  const era = ERAS.find(e => e.id === eraId);
  const map = era.maps.find(m => m.name === mapName);
  if (isCmp) {
    if (!cmpA) { cmpA = map; nav(eraId); }
    else if (cmpA.name === map.name) { cmpA = null; nav(eraId); }
    else { renderComparison(cmpA, map); }
  } else {
    renderMap(map, era);
  }
}

function nav(id) {
  curPage = id;
  const main = document.getElementById('main');
  if (id === 'home') {
    main.innerHTML = `<div class="page">
      <div class="pg-lbl">Introduction</div>
      <h1 class="pg-title">Maps are not territories.</h1>
      <div class="static-text"><p>${ERA_TEXT.home}</p></div>
      <div class="era-cards">${ERAS.map(e => `
        <div class="era-card" onclick="nav('${e.id}')">
          <div class="era-tag" style="color:${e.hue}">${e.label}</div>
          <div class="era-yrs">${e.years}</div>
        </div>`).join('')}</div>
    </div>`;
  } else {
    const e = ERAS.find(x => x.id === id);
    main.innerHTML = `<div class="page">
      <div class="pg-lbl">Era Overview</div>
      <h1 class="pg-title" style="color:${e.hue}">${e.label}</h1>
      <div class="pg-sub">${e.years}</div>
      <div class="thesis">${e.thesis}</div>
      <div class="tradeoff">
        <div class="to-col"><div class="to-lbl">Gained</div>${e.gained.map(g => `<div class="pill pill-g">${g}</div>`).join('')}</div>
        <div class="to-col"><div class="to-lbl">Sacrificed</div>${e.sacrificed.map(s => `<div class="pill pill-s">${s}</div>`).join('')}</div>
      </div>
      <div class="divider"></div>
      <div class="map-grid">${e.maps.map(m => `
        <div class="map-card" onclick="handleMapClick('${e.id}','${m.name}')">
          <div class="map-nm">${esc(m.name)}</div>
          <div class="map-mt">${m.year}</div>
        </div>`).join('')}</div>
    </div>`;
  }
  renderSidebar();
}

function renderMap(m, era) {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="page-wide">
    <div class="pg-lbl">${era.label} / ${m.year}</div>
    <h1 class="pg-title">${esc(m.name)}</h1>
    <div class="pg-sub">${m.region}</div>
    <div class="radar-wrap">
      <div class="axes-list">
        ${AXES.map(ax => `
          <div class="ax-row">
            <span class="ax-nb">${ax.label}</span>
            <div class="ax-dots">${[1,2,3,4,5].map(v => `<div class="adot" style="background:${v <= m.axes[ax.id] ? era.hue : 'var(--vfaint)'}"></div>`).join('')}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="tradeoff">
      <div class="to-col"><div class="to-lbl">Gained</div>${m.gained.map(g => `<div class="pill pill-g">${g}</div>`).join('')}</div>
      <div class="to-col"><div class="to-lbl">Sacrificed</div>${m.sacrificed.map(s => `<div class="pill pill-s">${s}</div>`).join('')}</div>
    </div>
  </div>`;
}

function toggleCmp() {
  isCmp = !isCmp;
  cmpA = null;
  document.getElementById('cmp-btn').classList.toggle('active', isCmp);
  document.getElementById('cmp-banner').style.display = isCmp ? 'flex' : 'none';
  document.getElementById('cmp-msg').innerText = isCmp ? 'Select first map from sidebar...' : '';
  renderSidebar();
}

function renderComparison(a, b) {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="page-wide">
    <div class="pg-lbl">Comparison</div>
    <h1 class="pg-title">Trade-off Analysis</h1>
    <div class="cmp-cards">
      <div class="cmp-card" style="background:#0F1515;border:1px solid #1A3030">
        <div class="era-tag" style="color:var(--teal)">${esc(a.name)}</div>
        <div class="era-yrs">${a.year}</div>
      </div>
      <div class="cmp-card" style="background:var(--bg-card);border:1px solid var(--border)">
        <div class="era-tag" style="color:var(--gold)">${esc(b.name)}</div>
        <div class="era-yrs">${b.year}</div>
      </div>
    </div>
    <div class="axes-list">
       ${AXES.map(ax => {
         const diff = b.axes[ax.id] - a.axes[ax.id];
         return `<div class="ax-row">
           <span class="ax-nb">${ax.label}</span>
           <div class="ax-dots">${[1,2,3,4,5].map(v => `<div class="adot" style="background:${v <= a.axes[ax.id] ? 'var(--teal)' : (v <= b.axes[ax.id] ? 'var(--gold)' : 'var(--vfaint)')}"></div>`).join('')}</div>
           <span class="ax-sc ${diff > 0 ? 'dp' : (diff < 0 ? 'dn' : '')}">${diff > 0 ? '+' : ''}${diff}</span>
         </div>`;
       }).join('')}
    </div>
    <div class="nav-btns">
      <button class="btn btn-teal" onclick="toggleCmp()">Exit Comparison</button>
    </div>
  </div>`;
}

function toggleMob(){
  document.getElementById('sidebar').classList.toggle('mob-open');
  document.getElementById('mob-bd').classList.toggle('show');
}

// Start
nav('home');
</script>
