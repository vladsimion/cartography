const ERA_TEXT = {"ancient":"The earliest maps were not attempts to represent the world as it was — they were attempts to claim it, order it, and make it meaningful. The Babylonians placed themselves at the centre of a circular cosmos; the Romans stretched their empire across a scroll that deliberately distorted shape to show roads and distances. When Anaximander drew the first Greek world map, he was not surveying territory but constructing a cosmology. Even Ptolemy, the most mathematically rigorous ancient cartographer, embedded his coordinate system inside a worldview that would mislead European navigators for over a thousand years by enclosing the Indian Ocean.\n\nThe great sacrifice of the ancient world was navigational usability — almost none of these maps could guide you anywhere. What they gave in return was something richer: a framework for thinking about where human existence sat within a larger order.","medieval":"Medieval European maps are routinely dismissed as ignorant — replaced by the supposedly superior spatial knowledge of the Renaissance. This is a fundamental misreading. The Hereford Mappa Mundi and the T-O tradition were not failed attempts at accuracy. They were successful encyclopedias. Their makers knew perfectly well that Jerusalem was not geometrically at the centre of the Earth; placing it there was a theological argument, not a navigational error.\n\nWhat medieval Christian cartography sacrificed in geometric truth it more than compensated for in knowledge density. The Hereford map alone contains over 700 annotated places drawn from scripture, natural history, classical literature, and traveller accounts. The portolan charts, running parallel to this tradition, demonstrate that medieval sailors could produce geometrically accurate coastlines when navigation required it. They simply chose not to apply that standard to world maps, because world maps served a different purpose entirely.","nonwestern":"The standard history of cartography moves from Greek projection theory through medieval mappae mundi to the Renaissance explosion of accurate world maps. This narrative is Eurocentric to the point of distortion. While European monks were placing Jerusalem at the centre of parchment worlds, Korean cartographers were drawing a triangular Africa they had never visited, Chinese admirals were charting the Indian Ocean coast from memory, and Micronesian navigators were encoding ocean swell patterns into palm-frond grids they read by feel in the dark.\n\nThe Da Ming Hunyi Tu of 1389 shows a recognisable Africa decades before Dias rounded the Cape. The Kangnido of 1402 depicts Europe with roughly correct proportions drawn from Islamic sources. These traditions were not lagging behind European cartography. They were parallel, sophisticated, and largely invisible to the history that followed because European empire, not intellectual merit, determined which maps became canonical.","renaissance":"The Renaissance did not discover the world — it claimed it. The explosion of new geographic knowledge that followed Columbus and Vasco da Gama was inseparable from the political project of dividing the globe between competing empires. The Cantino Planisphere was smuggled out of Portugal because it was a state secret. The Waldseemüller map named a continent after one explorer and erased the civilisations already living there. Mercator's projection, optimised for ocean navigation, encoded a Eurocentric worldview into classrooms for four centuries.\n\nThe Renaissance cartographic tradition gained mathematical rigour, printed distribution, and global scope. What it sacrificed was harder to name: the honesty of blank space, the humility of terra incognita, and the geographic knowledge systems of every culture it overwrote.","scientific":"The Scientific Revolution transformed cartography from an art of synthesis into a technology of measurement. The Cassini family spent seventy years triangulating France; Cook's Pacific charts replaced Polynesian wave-piloting traditions with astronomical coordinates. The great paradox of this era is that as maps became more precise, they also became more confidently wrong in new ways: blank spaces were filled not with honest uncertainty but with speculative coastlines that looked authoritative.\n\nThe encyclopedic richness of earlier maps — the mill notations, the forest names, the local knowledge accumulated over generations — was stripped away in favour of a single, standardised data layer. The scientific map gained accuracy and coverage. It sacrificed local knowledge and the admission of ignorance.","modern":"The nineteenth and twentieth centuries split cartography into two irreconcilable streams. The state tradition pushed toward precision: geodetic surveys, contour lines, standardised symbols, the systematic replacement of indigenous place names. Simultaneously, a counter-tradition emerged that deliberately sacrificed geographic accuracy for analytical power.\n\nJohn Snow's dot map proved that place causes disease. Charles Booth colour-coded London's streets by social class. Charles Minard compressed Napoleon's entire Russian catastrophe into a single image. Harry Beck stripped the London Underground of all geographic truth and produced the most legible transit map ever made. These maps disagree fundamentally about what a map is for. The tension between them is still unresolved.","digital":"Digital mapping gave everyone a map and took away their ability to read one. The generation that grew up with GPS can navigate anywhere without developing any mental model of where they are. Google Maps knows the fastest route to your destination; it cannot tell you which direction is north.\n\nOpenStreetMap built the most comprehensive geographic database in history through ten million volunteers — and its quality in rural regions is still unreliable. LiDAR can reveal Maya cities invisible to aerial photography — and produces data that requires specialist software to interpret. The digital era has not solved the trade-offs that structured cartographic history since the Babylonians. It has accelerated them, democratised them, and made them harder to see."};
const MAP_TEXT = {"Çatalhöyük Wall Painting":"The painting discovered at Çatalhöyük in modern Turkey is, depending on how liberally you define the term, the oldest map ever made. Dating to approximately 6200 BCE, it depicts a settlement plan — rectangular buildings arranged in rows — with what appears to be a twin-peaked volcano erupting in the background, identified with Hasan Dağ some 130 kilometres to the northeast. Whether this constitutes a map in any meaningful sense is genuinely contested. It may be a decorative panel, a ritual object, or a record of a specific observed event.\n\nWhat makes it significant is precisely its ambiguity: it demonstrates that the impulse to represent space pictorially, to link human settlement to landscape feature, predates writing, mathematics, and every subsequent cartographic tradition by millennia. The painting asks nothing of its viewer in terms of orientation or scale. It is a picture of a place, not an instruction for navigating to one.\n\nIn this sense it represents the irreducible core of what a map is before it becomes a technology: a shared image of where we are and what surrounds us. What it sacrificed — portability, reproducibility, abstract spatial reasoning — would be developed over the following six thousand years.","Babylonian World Map (Imago Mundi)":"The Babylonian world map, inscribed on a clay tablet around 600 BCE and now held in the British Museum, is the oldest surviving intentional world map — a document that attempts to represent not a local area but the totality of existence. Babylon sits at the centre. The Euphrates runs through it. A circular ocean rings the known world. Beyond the ocean, eight triangular regions are labelled with mythological names — places where the sun does not shine, where a horned bull lives, where the light is brighter than any star.\n\nThe map makes no attempt to represent geographic reality as we understand it. Regions the Babylonians knew well — Assyria, Elam, Urartu — are present but distorted beyond recognition. The point is not accuracy. The point is cosmological order: to show how human civilisation, and specifically Babylonian civilisation, relates to the structure of the universe.\n\nThis is the first fully explicit statement of a principle that cartographic history will replay endlessly: the map is not the territory. It is an argument about the territory, made by someone with a particular interest in how that argument comes out.","Anaximander's World Map":"Anaximander of Miletus, working around 550 BCE, is credited with producing the first Greek world map — a work known only through later descriptions, since no original survives. What we know suggests a circular disc of land surrounded by ocean, with Greece at the centre, the Mediterranean as its axis, and the known world extending east toward Persia and India. It was, by any geometric standard, wildly inaccurate. But that misses the point entirely.\n\nWhat Anaximander actually did was conceptually revolutionary: he treated the question of what the world looks like as a rational inquiry rather than a mythological one. His predecessors had answered the question through narrative and cosmology. Anaximander answered it through observation, analogy, and geometric reasoning. He was wrong about the proportions. He was right that the question deserved a rational answer.\n\nEvery subsequent cartographic tradition in the Western world descends from this decision. The sacrifice Anaximander made was epistemic humility — his map was far more confident about regions he had never visited than any honest surveyor should be. The gain was the idea that space could be systematically reasoned about, measured, and represented.","Eratosthenes' World Map":"Eratosthenes of Cyrene, working in Alexandria around 194 BCE, produced the first map built on a calculated circumference of the Earth — and his calculation was accurate to within approximately two percent. He measured the angle of the sun's shadow at Alexandria and at Syene on the same day, applied basic geometry, and arrived at a figure that would not be significantly improved upon for over a thousand years. His world map incorporated this calculation into a grid of parallels and meridians grounded in real astronomical observation.\n\nThe map was not a navigational tool. It was a scientific argument — a demonstration that the Earth's surface could be measured, subdivided, and represented at consistent scale. Eratosthenes' Africa extended too far east. His India was too small. His Atlantic coast was largely invented. But the framework he established — longitude, latitude, consistent scale — is the framework every world map since has inherited.\n\nWhat Eratosthenes sacrificed was the visual richness of earlier Greek geographic writing. His map was an instrument, not a picture. It contained coordinates and proportions rather than the mythological annotations that made earlier accounts compelling. The trade was worth making. But something was lost: the map became a technical document rather than a window onto the strangeness of the world.","Tabula Peutingeriana":"The Tabula Peutingeriana is a medieval copy of a Roman road map, probably based on a document from around 300 CE, that depicts the entire road network of the Roman Empire from Britain to India across a scroll nearly seven metres long and just thirty-four centimetres wide. The world is stretched to extreme horizontal elongation because the thing being mapped is not space but connectivity: which roads lead where, how far the staging posts are, where the military installations sit.\n\nGeographic truth is comprehensively sacrificed. The Mediterranean is a thin horizontal band. Britain is a tiny appendage. Italy points the wrong direction. None of this matters, because the Peutinger Table was never intended to tell you what the world looks like. It was intended to tell you how long it would take to march a legion from Rome to Constantinople.\n\nThe conceptual move the Peutinger Table makes is the same move Harry Beck would make fifteen centuries later with the London Underground map: replace geographic accuracy with topological clarity. Show the connections, not the space between them. The result is a document of extraordinary practical power and almost zero spatial truth.","Ptolemy's World Map":"Claudius Ptolemy's Geographia, written in Alexandria around 150 CE, is the founding document of Western mathematical cartography. It introduced a systematic framework of latitude and longitude coordinates, described multiple projection methods for representing a spherical surface on a flat plane, and provided a gazetteer of some eight thousand place names with their coordinates. It was the most sophisticated geographic work produced in the ancient world.\n\nIt was also wrong in ways that would mislead European explorers for over a millennium. Ptolemy underestimated the Earth's circumference, leading Columbus to believe Asia was within sailing distance to the west. He enclosed the Indian Ocean as a landlocked sea — a fiction that Fra Mauro correctly rejected in 1450 but that persisted in many maps long after. His knowledge deteriorated rapidly east of Persia and south of the Sahara, regions he populated with informed speculation that later cartographers treated as established fact.\n\nThe cruelest irony of the Ptolemaic tradition is that its very systematisation — the coordinate framework, the reproducible methodology — made its errors more durable. A mythology can be locally contradicted. A mathematical system provides the scaffolding for its own authority.","T-O Map (Isidore of Seville)":"The T-O map, codified by Isidore of Seville around 600 CE and reproduced in hundreds of medieval manuscripts, reduces the world to its barest conceptual skeleton: a circle divided by a T into three continents. The vertical stroke is the Mediterranean. The horizontal stroke is the Nile and the Don. Above the crossbar is Asia. Below left is Europe, below right is Africa. Jerusalem is sometimes marked at the centre. East is at the top, because that is where Eden lies.\n\nIn geographic terms, this is not a map at all. It contains no distances, no coastlines, no navigational information whatsoever. In conceptual terms, it is one of the most powerful documents in the history of cartography — a diagram so simple that it could be drawn in seconds and so charged with meaning that it organised European thinking about the shape of the world for nearly a thousand years.\n\nThe T-O map is not a failure of geographic knowledge. Medieval scholars had access to Ptolemy and knew the world was more complicated than three triangles. The T-O map served a different function: a mnemonic device for the Christian cosmological order. Calling it inaccurate is like calling a crucifix an inaccurate representation of a human body.","Al-Balkhi School Maps (KMMS)":"The Balkhi school of Islamic cartography, flourishing in the tenth century, produced a tradition of maps so different from contemporary European or Chinese practice that Western scholars long dismissed them as primitive. They are nothing of the kind. The KMMS maps deliberately chose abstraction over representation. Rivers appear as straight lines or perfect arcs. Coastlines are geometric. Distances between cities are equalised. The maps cover only the Islamic world, with non-Muslim territories rendered as blank margins.\n\nThis is not ignorance but a principled decision about what a map is for. The Balkhi school maps were administrative and devotional instruments. They showed the Muslim world as a coherent political and spiritual entity, with Arabia at the centre, internally connected by routes that mattered to Muslim merchants and pilgrims. Geographic accuracy for its own sake was not the goal.\n\nThe parallel with Beck's Underground map is exact: both traditions sacrificed geographic truth to produce topological clarity about a network that mattered. The difference is that the Balkhi school sacrificed truth in service of a worldview, while Beck sacrificed it in service of commuters.","Al-Idrisi's Tabula Rogeriana":"Muhammad al-Idrisi was born in Ceuta, studied in Córdoba, and spent the last decades of his career at the court of Roger II of Sicily — a Norman king who collected Arabic scholars. The map al-Idrisi completed in 1154 was the most accurate world map produced anywhere in the twelfth century. It synthesised Greek mathematical geography, Arab merchant accounts, Persian itineraries, and Norman diplomatic intelligence into a single image that correctly depicted the shape of Africa, the configuration of the Indian Ocean, and the existence of Scandinavia.\n\nAl-Idrisi drew his maps with south at the top — a convention of Islamic cartography that oriented the world toward Mecca. This meant that when his maps were reproduced by European scholars, they had to be flipped, a process that introduced errors and created the impression that the original was somehow inverted rather than differently oriented.\n\nThe Tabula Rogeriana is the clearest evidence that the cartographic dark ages attributed to the medieval period were a specifically European phenomenon. Elsewhere, at exactly the same moment, cartography was advancing.","Hereford Mappa Mundi":"The Hereford Mappa Mundi, produced in England around 1300 CE and still displayed in Hereford Cathedral, is the largest surviving medieval world map. It is oriented with east at the top, Jerusalem at the centre, Paradise at the apex, and the monsters of the classical tradition filling the marginal regions. To dismiss it as geographically ignorant is to fundamentally misunderstand what it is.\n\nThe Hereford map is a visual encyclopaedia of medieval knowledge — geographic, historical, scriptural, and natural historical — compressed into a single image intended for display and contemplation rather than navigation. It locates the Ark of Noah, the Labyrinth of Crete, Alexander's Wall, and the garden of Gethsemane. It contains, in some sense, everything an educated thirteenth-century European knew or believed about the shape of the world.\n\nTo ask whether it is accurate is to ask whether a cathedral window is a good source of light. The question mistakes the object's purpose entirely.","Ebstorf Map":"The Ebstorf Map, created at a Benedictine monastery in northern Germany around 1234, was the largest mappa mundi ever made — a circular composition approximately 3.6 metres in diameter, painted on thirty goatskins sewn together. Christ's head appeared at the top, his hands at the sides, his feet at the bottom: the world was literally inscribed within the body of God. The map contained over 1,500 illustrations, place names, and legends drawn from scripture, classical literature, and traveller accounts.\n\nThe Ebstorf Map was destroyed in an Allied bombing raid on Hanover in 1943. It survives only in nineteenth-century photographs and facsimiles, which means that all modern scholars of the map are studying a copy of a copy — a document about a document about the world. This recursion seems appropriate for an object whose makers understood representation not as the accurate capture of reality but as the construction of meaning.\n\nWhat the Ebstorf Map reveals, in its enormous ambition, is the fundamental choice that underlies every map ever made: what is this for? The Ebstorf answer — to show the world as the body of Christ, to integrate human geography into divine order — is not a less sophisticated answer than the surveyor's. It is a different answer to a different question.","Portolan Charts":"Portolan charts first appeared in the Mediterranean in the late thirteenth century and represent one of the most sudden and dramatic advances in the history of cartography. Their coastlines — particularly of the Mediterranean and Black Sea — are accurate to a degree that would not be surpassed until the era of geodetic survey. The mechanism by which this accuracy was achieved is still debated: the charts appear to have been compiled from compass bearings and estimated distances taken by generations of sailors.\n\nThe portolan chart sacrificed interior knowledge entirely. The land behind the coastline is mostly blank, occasionally decorated with city symbols and the names of rulers. The sea is covered by a dense web of rhumb lines — lines connecting compass roses — that a navigator could use to determine a sailing direction. The chart was a working tool, not a display object.\n\nWhat the portolan tradition established was a principle that would run through all subsequent navigational cartography: coastal geometry matters more than interior understanding. This is true for sailors. It is not true for almost anyone else.","Fra Mauro World Map":"Fra Mauro was a Venetian monk who died around 1459 having produced what is arguably the greatest world map of the pre-Columbian era. His circular planisphere, roughly two metres in diameter, was commissioned by King Afonso V of Portugal and compiled from Ptolemy, Arab geographical texts, Marco Polo's accounts, Ethiopian Christian pilgrims, and Venetian merchants with experience of the Indian Ocean trade.\n\nWhat makes the Fra Mauro map historically decisive is a single choice: he rejected Ptolemy's enclosed Indian Ocean. Every major European map for the previous thousand years had treated the Indian Ocean as a landlocked sea, making circumnavigation impossible. Fra Mauro drew Africa as a peninsula, surrounded by ocean, with a navigable sea route to Asia around its southern tip. He did this forty years before Bartolomeu Dias actually rounded the Cape. He was right, and he based his decision on Arab and Ethiopian sources that had known this for centuries.\n\nThe Fra Mauro map sits at the precise hinge point between medieval cosmological cartography and Renaissance navigational cartography. It retains the circular form and encyclopaedic richness of the mappae mundi. But its geographic intelligence points directly toward the age of exploration.","Da Ming Hunyi Tu":"The Da Ming Hunyi Tu — the Amalgamated Map of the Great Ming Empire — was produced in China around 1389. What makes it extraordinary is not its coverage of China but its representation of the regions beyond: Africa appears as a recognisable triangular peninsula, correctly oriented, with a label indicating its southernmost extent. Europe is present, compressed but identifiable.\n\nThis map was produced before Bartolomeu Dias rounded the Cape of Good Hope in 1488, before Vasco da Gama reached India in 1498, and before any European had direct geographic knowledge of sub-Saharan Africa's true shape. Its accurate African outline derives from Chinese access to Islamic geographic sources — the accumulated knowledge of Arab merchants who had been trading along the East African coast for centuries.\n\nThe map's existence is a direct challenge to the narrative that places European Renaissance cartography at the origin of accurate world geography. The knowledge existed. It was documented. It simply existed outside the tradition that subsequently became canonical.","Kangnido Map":"The Kangnido was produced in Korea in 1402 by two government officials working from Chinese and Islamic source maps. It depicts the entire known world from Korea's perspective: China dominates the centre, Korea is shown prominently in the east, and to the west appear India, the Islamic world, Africa, and a small but recognisable Europe.\n\nAfrica on the Kangnido is shown as a roughly triangular landmass with a correct southward taper — the same shape that appears on the Da Ming Hunyi Tu and that would not appear on a European map until the late fifteenth century. The relative sizes are wrong, and the distances between regions are severely compressed. But the basic geographic structure of the Old World is correctly represented.\n\nThe Kangnido is a monument to the geographic knowledge assembled by the Islamic cartographic tradition and transmitted eastward through Chinese intermediaries. It is also a monument to the contingency of cartographic history: had East Asian geographic knowledge driven the age of exploration, the canonical world map might have been centred on Beijing rather than Lisbon.","Zheng He / Mao Kun Chart":"Between 1405 and 1433, the Chinese admiral Zheng He led seven voyages of extraordinary scale — fleets of hundreds of ships carrying tens of thousands of men across the Indian Ocean to Southeast Asia, India, Arabia, and the East African coast. The navigational charts that resulted, preserved in a compilation known as the Mao Kun map, represent the most extensive maritime geographic knowledge assembled by any civilisation before the European age of exploration.\n\nThe Mao Kun charts are route maps: long, narrow strips showing coastlines, anchorages, sailing directions, and distances along specific routes. They are oriented to the direction of travel rather than to compass north. To read them, you must already know where you are going — they are records of voyages already made rather than guides to voyages yet to be taken.\n\nThe political decision to end the voyages — made by Chinese emperors who regarded maritime expansion as expensive and destabilising — ensured that this geographic knowledge would not become the foundation for a global cartographic tradition. The ships were burned. The records were suppressed. The routes that Zheng He's navigators had charted were subsequently rediscovered by Portuguese sailors who needed decades to match what Chinese navigators had accomplished in a generation.","Marshall Islands Stick Charts":"The stick charts produced by navigators of the Marshall Islands are among the most conceptually radical objects in the entire history of cartography. Made from coconut palm frond midribs tied into grids and weighted with shells marking island positions, they do not represent the visual appearance of ocean space. They encode the behaviour of ocean swells — the way deep-water wave patterns are bent, reflected, and refracted by islands — as a tactile diagram that a navigator reads by feel, not by sight.\n\nA Marshall Islands navigator sailing at night would lie in the bottom of a canoe and feel the motion of the hull — the rhythmic rise and fall indicating open-ocean swell, the cross-chop appearing when two swell patterns intersected near an island. The stick chart was a training device for developing this embodied knowledge, not an operational instrument used at sea.\n\nThe stick charts represent something no other cartographic tradition seriously attempted: the mapping of sensory experience rather than visual space. They are incompatible with the assumption — so deeply embedded in European and East Asian cartography — that a map is fundamentally a picture. Their suppression by colonial European navigation represents the loss not just of local knowledge but of an entire alternative conception of what geographic representation can be.","Matteo Ricci's Kunyu Wanguo Quantu":"Matteo Ricci was a Jesuit missionary who arrived in China in 1582 and spent three decades becoming one of the most sophisticated cultural translators in the history of East-West encounter. His world map, the Kunyu Wanguo Quantu, was produced in Beijing in 1602 at the request of the Wanli Emperor and represents one of the most remarkable cartographic documents ever created.\n\nThe map is, in its geographic content, a European world map: it uses European projection methods and European knowledge of the Americas. But Ricci made one crucial adaptation: he moved the central meridian so that China, rather than Europe, lay at the centre of the world. This was not a geographic decision. It was a diplomatic one — a recognition that a world map presented to a Chinese emperor would need to show China in its proper position at the centre of civilisation.\n\nThe Kunyu Wanguo Quantu is the clearest single illustration of the argument that the choice of what to place at the centre of a world map is always a political act. Every world map centres something. The choice of what that something is reflects not geographic reality — the Earth has no centre — but power, identity, and the audience being addressed.","Cantino Planisphere":"The Cantino Planisphere takes its name not from its maker — who remains anonymous — but from Alberto Cantino, an Italian agent who paid to smuggle it out of Lisbon in 1502. It was a state secret: a map summarising the accumulated geographic intelligence of decades of Portuguese exploration along the coasts of Africa, Brazil, and the Indian Ocean.\n\nThe West African coastline, the result of systematic Portuguese coastal exploration since the 1430s, is drawn with accuracy that would not be significantly improved for another century. Brazil appears, correctly identified as a separate landmass. The Tordesillas Line — the 1494 papal division of the world between Spain and Portugal — is drawn across the Atlantic, making this the earliest surviving map to show the treaty boundary that divided the New World between two empires before either had fully explored it.\n\nWhat the Cantino Planisphere reveals most starkly is the nature of cartographic knowledge in the age of exploration: it was proprietary intelligence, not public knowledge. Maps like this were produced at state expense, kept in locked archives, and treated as military secrets.","Waldseemüller Map (Universalis Cosmographia)":"Martin Waldseemüller's world map of 1507 is known, with only slight exaggeration, as America's birth certificate — the document in which the New World first received its name. Waldseemüller printed the name America across the southern landmass in honour of Amerigo Vespucci, who had argued that the lands Columbus had reached were not Asia but a previously unknown continent. The name stuck despite Waldseemüller himself later removing it from subsequent editions.\n\nThe map was produced in an edition of approximately one thousand copies — an unprecedented print run, made possible by the printing press. It is large, beautifully executed, and ambitious: it shows a Pacific Ocean that Columbus had not reached and Magellan would not cross for another decade, based on reasoning from Vespucci's accounts about the width of the newly discovered landmass.\n\nThe Waldseemüller map is also an act of comprehensive erasure. The millions of people already living in the Americas, with their own geographic knowledge and their own place names, are present only as a blank continent awaiting the name of a Florentine navigator.","Piri Reis Map":"The Ottoman admiral and cartographer Piri Reis produced his world map in Constantinople in 1513, less than two decades after Columbus's first voyage. Only the western portion survives, but it is enough to make clear that Piri Reis had access to an extraordinary range of source material. He annotated the map himself, noting that he had drawn on twenty sources including eight Ptolemaic maps, four Portuguese charts, and a map that Columbus himself had drawn of the Caribbean.\n\nThe Piri Reis map is one of the few surviving cartographic documents that shows the early European discoveries from a non-European perspective — the view from Constantinople, where Islamic geographic tradition, Ptolemaic scholarship, and the new Atlantic discoveries were synthesised by a cartographer working in an intellectual tradition entirely distinct from the Lisbon or Antwerp schools.\n\nThe map has attracted, since the twentieth century, a persistent fringe literature claiming that it proves ancient knowledge of Antarctica. These claims are not serious. What is serious is the evidence the map provides that the cartographic revolution of the early sixteenth century was not a uniquely European phenomenon.","Mercator's World Map":"Gerardus Mercator's world map of 1569 solved a specific problem with such elegance that its solution became the default representation of the world for the following four centuries. The problem: on a spherical surface, lines of constant compass bearing are curves. A navigator sailing at a fixed compass bearing needs a chart on which those curves appear as straight lines. Mercator produced a projection that achieved exactly this, by progressively expanding the scale toward the poles.\n\nThe map was brilliant for its intended purpose. Its unintended consequence was that it made Greenland appear the size of Africa, and made Europe and North America appear far larger relative to tropical regions than they are. This distortion was subsequently adopted as the default world map in European schools, embedded in the visual intuition of generations who came to believe the world was shaped the way Mercator showed it.\n\nThe Mercator projection is not a conspiracy. It is not primarily a political document. It is a navigational instrument that was misapplied as a general-purpose world map, with the result that European children's intuition about the relative sizes of continents was systematically distorted in favour of Europe.","Ortelius's Theatrum Orbis Terrarum":"Abraham Ortelius published the Theatrum Orbis Terrarum in Antwerp in 1570 and in doing so invented a new kind of cartographic object: the commercial atlas. Ortelius produced something qualitatively different from previous map collections — a uniform-format collection of seventy maps accompanied by text, printed by the same press, sold as a single commercial product, and updated through multiple editions.\n\nThe Theatrum was not the most accurate atlas of its day. Ortelius was a compiler rather than an original surveyor, and he worked with the best available sources while acknowledging their limitations — he included, in a remarkable gesture of scholarly transparency, a bibliography of the 87 cartographers whose work he had used.\n\nThe Theatrum made geographic knowledge available to the educated European public for the first time on a systematic basis. It went through forty-two editions in his lifetime and was translated into multiple languages. It established the expectation that maps should be produced as a series, updated as knowledge improved, and sold as books — an expectation that structured the cartographic industry for the next three centuries.","Blaeu's Atlas Maior":"Joan Blaeu's Atlas Maior, published in Amsterdam in 1662, was the most expensive book produced in the seventeenth century and, by many accounts, the most beautiful atlas ever made. Eleven volumes, six hundred maps, hand-coloured in brilliant pigments, with decorative borders depicting the peoples and landscapes of each region: it was cartography as luxury object, the supreme achievement of the Dutch Golden Age cartographic industry.\n\nThe irony of the Atlas Maior is that much of it was already outdated when it was published. The Dutch East India Company's navigators had been accumulating more accurate knowledge of Asian coasts for decades, but this information was proprietary. The publicly available maps in Blaeu's atlas were therefore often inferior to the classified charts in the VOC's archives. Spectacular inaccuracy and spectacular beauty existed simultaneously in the same city.\n\nThe Atlas Maior asks a question that every collector must eventually answer: what is a map worth when its geographic information is wrong? The answer, for four centuries of collectors who have paid extraordinary prices for Blaeu's work, has been: very much indeed.","Coronelli's Globe Pair":"Vincenzo Coronelli was a Franciscan friar and the most celebrated globe-maker of the seventeenth century. The pair of globes he constructed between 1681 and 1683 — one terrestrial, one celestial, each nearly four metres in diameter — were commissioned for presentation to Louis XIV, and remain the largest globes ever made. They required specially constructed rooms and two years of craftsmanship.\n\nThe Coronelli globes make every trade-off in the history of cartography physical. They are so large that no individual can see more than a fraction of the surface at once. They are so heavy and fragile that they have never been moved from the Bibliothèque nationale de France. They were made for one person — a king — and have been accessible to scholars only with difficulty ever since.\n\nWhat Coronelli's globes reveal is that the history of cartography is not only a history of maps as information systems. It is a history of maps as cultural objects — prestige items, political gifts, aesthetic achievements — whose value lies as much in what they represent about their makers as in what they reveal about the world.","Cassini Map of France":"The Cassini map of France is the founding document of modern topographic cartography — the first geometrically rigorous national survey ever completed. Produced by four successive generations of the Cassini family over nearly a century and a half, the 182-sheet series established a triangulation network across the entire country that accurately represented distances, elevations, roads, rivers, towns, forests, and administrative boundaries at a consistent scale.\n\nThe methodology was revolutionary: a network of triangulation points established by precise angular measurement, extended across the entire country in a systematic grid. The result was a map of France that allowed you to navigate by map rather than by local knowledge. It became the template for every national topographic survey that followed.\n\nWhat the Cassini map systematically sacrificed was the local knowledge it replaced. The vernacular place names, the oral geographic traditions, the ecological observations that had made earlier regional maps rich were stripped away in favour of standardised, reproducible, official information. The map told you where you were. It did not tell you anything about what that place was like.","Cook's Pacific Charts":"James Cook's three voyages, conducted between 1768 and 1779, produced the most comprehensive and accurate charts of the Pacific Ocean that the world had ever seen. Cook brought to his surveys a combination of astronomical observation, careful dead reckoning, and meticulous record-keeping that made his charts reliable for navigation in a way that no previous Pacific geographic knowledge had been.\n\nCook's charts also represent one of the most thoroughgoing acts of epistemic erasure in the history of cartography. The Pacific was not an empty ocean waiting to be mapped. It was home to Polynesian and Micronesian navigators who could find islands hundreds of miles away using star paths, wave patterns, and bird behaviour — who had settled the largest ocean on Earth without compass or chart. Cook's charts made their knowledge invisible by replacing it with a different kind of knowledge, one legible to European instruments.\n\nThe Pacific charts demonstrate the colonial structure of cartographic knowledge: what gets counted as knowledge, what gets recorded, and what gets erased is determined not by epistemological merit but by which tradition holds institutional and military power.","Bonne Projection World Map":"The Bonne projection, developed by the French cartographer Rigobert Bonne in the eighteenth century, was one of several attempts to solve the fundamental problem of world-map projection: the Mercator projection preserves angles but distorts areas, making tropical regions appear smaller than they are. An equal-area projection would be more honest about the proportions of the world.\n\nThe Bonne projection achieves equal-area representation at the cost of severe shape distortion toward the map's edges. The continents appear stretched and bent in the margins, in a way that strikes most viewers as more disturbing than Mercator's area distortion, even though the Bonne projection is in one mathematical sense more accurate. The map was used for official French cartography in the late eighteenth century, then largely abandoned.\n\nThe Bonne projection's brief career illustrates a recurring theme: the problem of projection has no solution, only trade-offs. Every flat map of a spherical world sacrifices something. The choice of what to sacrifice is not a technical decision but a values decision.","Minard's Napoleon March Map":"Charles Joseph Minard's 1869 graphic of Napoleon's 1812 Russian campaign is widely considered the greatest statistical chart ever produced. It encodes six variables simultaneously: the geographic path of the army's advance and retreat, the size of the army at each point shown as band width, the direction of movement, the dates of key events, and the temperature during the winter retreat. The band that begins at the Polish border representing 422,000 men shrinks as it advances toward Moscow and returns as a thin ribbon representing fewer than 10,000 survivors.\n\nMinard was a civil engineer who spent his retirement producing what he called cartes figuratives — statistical maps that made quantitative information visually immediate. His Napoleon graphic is the culmination of this project: a document that makes the scale of military catastrophe comprehensible in a single glance in a way that no table of numbers, no narrative, and no conventional map could achieve.\n\nThe Napoleon map is also a profoundly anti-heroic document. It does not show battles, victories, or the movements of commanders. It shows an arithmetic: men in, men out, temperature, distance. The absence of any heroic framing is not accidental. Minard was using his graphic skills to make an argument about the true cost of military ambition — an argument that the statistics make unanswerable.","Booth's Poverty Map of London":"Charles Booth was a Victorian shipping magnate who set out in the 1880s to refute the claim that a third of London's population lived in poverty. He suspected the figure was exaggerated. After years of systematic street-by-street inquiry — interviewing school board visitors, clergy, police constables, and charity workers — he concluded that the figure was, if anything, an underestimate. The resulting poverty maps colour-coded every street in London from black through shades of blue, purple, pink, red to yellow for the wealthiest.\n\nThe maps are extraordinary acts of social documentation — nothing like them had ever been produced before, and they directly influenced housing policy, welfare legislation, and the emerging discipline of urban sociology. They are also, inevitably, the product of their maker's assumptions. Booth's categories encode Victorian class anxieties: the people labelled vicious and semi-criminal were assigned their colours by police constables and charity workers whose assessments reflected prejudice as much as observation.\n\nBooth's maps demonstrate the inescapable reflexivity of social cartography: the map of poverty is made by people who are not poor, using categories that reflect the mapper's values, and the result is both a document of social reality and a construction of it.","Humboldt's Naturgemälde":"Alexander von Humboldt's Naturgemälde — the word means something like nature portrait — was published in 1807 as the frontispiece to his account of the ascent of Chimborazo in Ecuador. It is a cross-section of the mountain from base to summit, annotated along both margins with the corresponding data for every other mountain and climate zone on Earth: the altitude at which specific plants grow, the atmospheric pressure at each elevation, the temperature, the species of insects found at each level.\n\nThe Naturgemälde is not a map in any conventional sense. What it has is something no previous geographic document had attempted: the systematic representation of the relationships between altitude, climate, vegetation, and species across a single cross-section of the Earth's surface. It is the founding document of ecology as a science.\n\nHumboldt understood that the distribution of species was not random but structured — that the plants growing at 3,000 metres on an Andean volcano were the same species as those growing at sea level in the Arctic, because the determining variable was temperature, not latitude. The Naturgemälde makes this relationship visible for the first time. It is a map of a relationship rather than a place.","Snow's Cholera Map":"John Snow was a London physician who, during the cholera epidemic of August and September 1854, mapped every death from the disease in the Soho district of London. Each death was marked with a small bar at the location of the victim's home. When Snow looked at the resulting map, the pattern was unmistakable: the deaths clustered around a single water pump on Broad Street, with a striking absence of cases near the local brewery whose workers drank beer rather than water.\n\nSnow presented his map to the local Board of Guardians and persuaded them to remove the handle from the Broad Street pump. The epidemic stopped. Snow's map is credited with founding the discipline of epidemiology and with providing the clearest early evidence that cholera was a waterborne rather than airborne disease, overturning the dominant miasma theory.\n\nThe Broad Street map is one of the few examples in cartographic history of a map that directly and verifiably saved lives. It is also, in its elegant simplicity, a masterclass in what a thematic map can do that no other form of evidence can: make a spatial pattern visible in a way that demands a causal explanation.","USGS Topographic Survey Maps":"The United States Geological Survey, established in 1879, produced over the following century the most comprehensive topographic survey of any large country in the world. The resulting maps — standardised sheets showing terrain through contour lines, drainage in blue, human settlement in black, and vegetation in green — became the foundation for American land management, military planning, environmental science, and outdoor recreation.\n\nThe USGS topographic map is the closest thing the modern world has produced to a neutral, authoritative representation of landscape. Its conventions are so deeply embedded in American geographic literacy that the contour line has become almost invisible — a natural feature of the landscape rather than a cartographic choice. This invisibility is worth examining. The decision to represent terrain through contour lines was a choice with consequences.\n\nThe USGS maps also participated, as all national surveys do, in the systematic replacement of indigenous place names with European ones. The landscape of the American West documented in these maps is a landscape that has been renamed — a process of cartographic colonisation whose effects persist in every road atlas, GPS database, and hiking map that descends from the USGS survey.","Beck's London Underground Map":"Harry Beck was a technical draughtsman at London Underground who, in 1931, produced a redesign of the Underground map as a personal project. His insight was simple and radical: the only information that passengers needed was which line to take, where to change, and what order the stations appeared in. Geographic accuracy was irrelevant to this task and actively interfered with legibility.\n\nBeck's map replaced geography with topology. Stations were spaced evenly. Lines ran at 45 or 90 degrees. The scale expanded in the centre and compressed in the suburbs. The result was a map that bore almost no relationship to the physical geography of London — King's Cross is not really equidistant from Euston and St Pancras — but that allowed any passenger to find a route in seconds.\n\nThe map was initially rejected by London Underground's publicity department as too radical. When they trialled it, it was immediately and permanently popular. Beck's Underground map has since been copied by every major transit system in the world. It is the clearest possible demonstration that usability and accuracy are not the same value, and that choosing one over the other is a legitimate and consequential design decision.","Peters Projection":"Arno Peters, a German historian, published his world map projection in 1974 with a polemical argument: the Mercator projection, by distorting the sizes of continents in favour of Europe and North America, encoded colonialism into the visual imagination of the world. His alternative — an equal-area cylindrical projection — was, he argued, not just mathematically more honest but politically more just.\n\nThe Peters projection does what it claims: Greenland appears correctly smaller than Africa rather than larger. South America appears correctly larger than Europe. The distortion is shifted from area to shape — the continents appear stretched vertically, giving them an unfamiliar elongated appearance that many viewers find more disturbing than the Mercator's area errors.\n\nThe cartographic profession largely rejected the Peters projection on technical grounds. But the political argument Peters made — that the choice of map projection is not a neutral technical decision but a choice with ideological consequences — was correct and important. The Mercator projection is still the default world map in most digital applications.","NASA Blue Marble":"On December 7, 1972, the crew of Apollo 17 photographed the Earth from approximately 45,000 kilometres. The resulting image — the Blue Marble — is the most widely reproduced photograph in history. It shows the whole Earth as a small, fragile, luminous sphere suspended in absolute blackness: Africa and Antarctica visible, weather systems swirling across the southern hemisphere.\n\nThe Blue Marble is a map only in the loosest sense — it contains no coordinate system, no political boundaries, no place names. What it provides is something no previous cartographic document could: a view of the Earth as a single object. All previous world maps had been abstractions — projections of a sphere onto a plane. The Blue Marble was a photograph, and photographs carry a different kind of epistemic authority.\n\nThe image's environmental consequences were immediate. It is credited with galvanising the environmental movement — with making viscerally visible the argument that the Earth was finite, whole, and shared. It did this by sacrificing precisely the information that all other maps provided: it showed no borders, no nations, no human presence at all.","Google Maps":"Google Maps launched in February 2005 and within a decade had become the most widely used navigation tool in human history. It offered, for the first time, turn-by-turn navigation integrated with real-time traffic data, accessible to anyone with a smartphone. Finding an unfamiliar address in an unfamiliar city, once a skill requiring either local knowledge or effort with printed maps, became trivial.\n\nThe costs of this democratisation are real. Research on spatial cognition consistently shows that GPS navigation degrades the development and maintenance of cognitive maps — the internal representations of space that humans use to orient themselves. People who use GPS navigation extensively become better at following instructions and worse at knowing where they are.\n\nGoogle Maps is also, in ways not always visible to users, a profoundly political document. Its representation of disputed territories changes depending on which country you access it from. Its coverage of commercial establishments reflects advertising relationships. It systematically under-represents informal settlements, indigenous territories, and regions without economic significance to Google's business model. It is not a neutral representation of geography. It is a commercial product that happens to be shaped like a map.","OpenStreetMap":"OpenStreetMap was founded in 2004 by Steve Coast, a British computer science student frustrated that the Ordnance Survey charged prohibitive fees for access to geographic data that British taxpayers had funded. His solution was to build a free, open, collaborative alternative — a wiki of geographic data that anyone could contribute to, correct, and use without restriction.\n\nTwenty years later, OpenStreetMap contains more geographic data than any previous mapping project in history — contributed by over ten million registered users, covering every continent. It is the only world map that documented the layout of refugee camps in Syria within weeks of their creation, that shows the footpaths of rural Malawi and the informal market stalls of Lagos, that can be freely downloaded and modified by anyone.\n\nIts weaknesses are the mirror image of its strengths. Coverage in wealthy, tech-connected regions is extraordinarily detailed. Coverage in remote or poor regions is patchy and sometimes years out of date. The community of contributors, overwhelmingly male and from the global north, produces a map that reflects their priorities. OpenStreetMap is the most democratic mapping project ever created — and also, in its demographics and coverage gaps, a map of who has internet access and time to volunteer.","LiDAR Terrain Maps":"LiDAR — Light Detection and Ranging — works by firing millions of laser pulses per second from an aircraft toward the ground and measuring the precise time each pulse takes to return. The result is a point cloud of extraordinary density: a three-dimensional record of the Earth's surface, accurate to a few centimetres, that can penetrate forest canopy to reveal the ground surface beneath.\n\nThe most dramatic consequence of LiDAR for cartography has been archaeological: surveys of jungle-covered regions have revealed, hidden beneath vegetation, urban landscapes of extraordinary scale. In 2018, a LiDAR survey of the Cambodian jungle around Angkor Wat revealed a medieval city far larger than archaeologists had imagined. Similar surveys in the Maya lowlands have revealed urban networks connecting millions of people in a civilisation far more sophisticated than the jungle ruins had suggested.\n\nLiDAR produces data, not maps. The point clouds it generates require specialist software to process and considerable expertise to interpret. The gap between the raw data and the map that a non-specialist can read is enormous. LiDAR gives us the most accurate picture of the Earth's surface ever produced, in a form that almost nobody can directly use."};

const AXIS_DEFS={accuracy:{what:"How closely the map represents geometric, spatial, and geographic reality — coastlines, distances, positions, shapes, proportions.",notWhat:"Not completeness (how much is shown) but correctness of what is shown.",tension:"Accuracy competes with usability (Beck's Tube Map), symbolism (mappae mundi reject it), and navigation (Mercator trades area accuracy for bearing accuracy).",rubric:[{score:1,label:"Symbolic",desc:"No geographic fidelity"},{score:2,label:"Rough",desc:"Significant distortion"},{score:3,label:"Mixed",desc:"Uneven quality by region"},{score:4,label:"High",desc:"Accurate for its era"},{score:5,label:"Ground truth",desc:"Verified by observation or satellite"}]},usability:{what:"Can a non-specialist use this map effectively? Clear visual hierarchy, legible annotation, appropriate scale.",notWhat:"Not accuracy. Beck's Tube Map is usable but geometrically wrong. Ptolemy's tables are accurate but unreadable.",tension:"Usability requires simplification, which erases intellectual richness. A map that means many things is harder to read quickly.",rubric:[{score:1,label:"Specialist only",desc:"Requires expert knowledge"},{score:2,label:"Trained reader",desc:"Needs scholarly effort"},{score:3,label:"Educated user",desc:"Moderate effort required"},{score:4,label:"Practical",desc:"Designed for practical use"},{score:5,label:"Intuitive",desc:"Immediately legible by anyone"}]},navigation:{what:"Does this map enable someone to move through space — by sea, road, rail, or air? Does it give bearings, distances, or routes?",notWhat:"Not the same as accuracy. Humboldt's map is accurate but useless for navigation. The Peutinger Table navigates perfectly despite geometric absurdity.",tension:"Navigation requires stripping everything irrelevant to movement. Richness, symbolism, and completeness are all its enemies.",rubric:[{score:1,label:"None",desc:"Symbolic or thematic only"},{score:2,label:"Orientation",desc:"General geographic sense"},{score:3,label:"Planning",desc:"Useful for planning, not real-time"},{score:4,label:"Active",desc:"Provides bearings or routes"},{score:5,label:"Operational",desc:"Used actively during travel"}]},symbolism:{what:"How richly does the map encode meaning beyond geography — cosmology, theology, myth, political ideology, or moral order?",notWhat:"Not decoration. Crude maps can have profound symbolic density (Babylonian Imago Mundi). Ornate maps can have low symbolic content.",tension:"Symbolism and accuracy are almost always in direct competition. The world is reshaped to express a worldview rather than measure one.",rubric:[{score:1,label:"Functional",desc:"No symbolic layering"},{score:2,label:"Incidental",desc:"Decorative only"},{score:3,label:"Moderate",desc:"Iconography or political claims"},{score:4,label:"Primary",desc:"Symbolism co-equal to geography"},{score:5,label:"The map IS the symbol",desc:"Geography serves ideology or theology"}]},politics:{what:"How directly does this map assert, justify, or serve political power? Does it claim territory, define borders, or erase peoples?",notWhat:"Not the same as symbolism. All maps are subtly political — this scores explicit, operational political function.",tension:"Political utility and geographic honesty are in fundamental tension. The most powerful maps often distorted most deliberately.",rubric:[{score:1,label:"Neutral",desc:"No power agenda"},{score:2,label:"Implicit",desc:"Serves a worldview subtly"},{score:3,label:"Commissioned",desc:"Made for a political authority"},{score:4,label:"Assertive",desc:"Claims territory or erases rivals"},{score:5,label:"Weapon",desc:"Reshapes global consciousness"}]},completeness:{what:"How much of the known world does this map attempt to show? Ambition of scope, not accuracy of what is shown.",notWhat:"Not accuracy. A portolan chart covers the Mediterranean with precision but scores 2/5 — it ignores the rest of the world.",tension:"Completeness and accuracy trade off sharply. Maps that cover everything fill gaps with speculation. The honest map leaves blanks; the complete map invents.",rubric:[{score:1,label:"Local",desc:"A city or single route"},{score:2,label:"Regional",desc:"A sea, country, or trade network"},{score:3,label:"Continental",desc:"Multi-regional with gaps"},{score:4,label:"Near-global",desc:"World with notable omissions"},{score:5,label:"Total",desc:"Comprehensive world coverage"}]},richness:{what:"How much layered, heterogeneous information does this map carry? Multiple knowledge types — topography, ecology, culture, history, annotation.",notWhat:"Not the same as accuracy or symbolism. A regional map with roads, forests, mills, and parish boundaries is rich without being symbolic.",tension:"Richness competes with usability (more information = harder to read fast) and navigation (a rich map is a slow map).",rubric:[{score:1,label:"Single layer",desc:"One data type only"},{score:2,label:"Sparse",desc:"Two or three layers"},{score:3,label:"Moderate",desc:"Several integrated layers"},{score:4,label:"Dense",desc:"Cultural, ecological, historical layers together"},{score:5,label:"Encyclopedic",desc:"Compressed world — removing it destroys knowledge"}]}};

const S={page:'home',eraId:null,mapIdx:null,cmpMode:false,cmpA:null,cmpB:null,axFilter:null,openDef:null,openInline:null};
const g=id=>ERAS.find(e=>e.id===id);
const gEraForMap=n=>ERAS.find(e=>e.maps.some(m=>m.name===n));
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function nav(page,eraId,mapIdx){S.page=page;S.eraId=eraId||null;S.mapIdx=mapIdx!=null?mapIdx:null;S.openInline=null;render();}

function toggleCmp(){
  S.cmpMode=!S.cmpMode;
  if(!S.cmpMode){S.cmpA=null;S.cmpB=null;}
  renderCmpUI();renderSidebar();
}
function selCmp(map){
  if(!S.cmpA){S.cmpA=map;renderCmpUI();renderSidebar();return;}
  if(map.name===S.cmpA.name)return;
  S.cmpB=map;S.cmpMode=false;S.page='compare';renderCmpUI();render();
}
function resetCmp(){S.cmpA=null;S.cmpB=null;S.cmpMode=false;nav('home');}
function startCmpFrom(n){const era=gEraForMap(n);const map=era.maps.find(m=>m.name===n);S.cmpMode=true;S.cmpA=map;S.cmpB=null;renderCmpUI();renderSidebar();}

function renderCmpUI(){
  const btn=document.getElementById('cmp-btn');
  const banner=document.getElementById('cmp-banner');
  const status=document.getElementById('cmp-status');
  const msg=document.getElementById('cmp-msg');
  btn.classList.toggle('active',S.cmpMode);
  banner.style.display=S.cmpMode?'flex':'none';
  if(S.cmpMode){
    msg.textContent=S.cmpA?'"'+S.cmpA.name+'" selected — pick the second map':'Pick the first map from the sidebar';
    status.textContent=S.cmpA?'Select map B →':'Select map A →';
    status.style.display='inline';
  }else{status.style.display='none';}
}

function renderAxisStrip(){
  const strip=document.getElementById('axis-strip');
  const panel=document.getElementById('def-panel');
  let h='<span class="ax-lbl">Axes:</span>';
  AXES.forEach(ax=>{
    h+='<div style="display:inline-flex;align-items:center;gap:1px"><button class="ax-btn'+(S.axFilter===ax.id?' active':'')+'" onclick="toggleAxF(''+ax.id+'')">'+ax.icon+' '+ax.label+'</button><button class="ax-help'+(S.openDef===ax.id?' open':'')+'" onclick="toggleAxD(''+ax.id+'')">?</button></div>';
  });
  if(S.openDef)h+='<button class="btn btn-ghost" onclick="closeAxD()" style="margin-left:auto;font-size:.58rem;padding:.15rem .55rem">&#10005;</button>';
  strip.innerHTML=h;
  if(S.openDef){
    const ax=AXES.find(a=>a.id===S.openDef);const def=AXIS_DEFS[S.openDef];
    panel.style.display='block';
    panel.innerHTML='<div class="def-grid"><div class="def-what"><div class="def-label">'+ax.icon+' '+ax.label+' — What it measures</div><p class="def-p">'+esc(def.what)+'</p><p class="def-p" style="font-style:italic;color:var(--vfaint)"><strong style="color:var(--faint);font-style:normal">Not:</strong> '+esc(def.notWhat)+'</p><div class="def-tension"><div class="def-tl">Key tension</div><p class="def-tp">'+esc(def.tension)+'</p></div></div><div><div class="def-label" style="margin-bottom:.5rem">Scoring rubric</div>'+def.rubric.map(r=>'<div class="rub-row"><div class="rub-dots">'+[1,2,3,4,5].map(i=>'<div class="rdot" style="background:'+(i<=r.score?'var(--gold)':'#1E1A14')+';border:1px solid '+(i<=r.score?'#C8A96E60':'#2A2418')+'"></div>').join('')+'</div><div class="rub-txt"><span class="rub-lbl">'+r.label+'</span> — '+esc(r.desc)+'</div></div>').join('')+'</div></div>';
  }else{panel.style.display='none';}
}
function toggleAxF(id){S.axFilter=S.axFilter===id?null:id;renderAxisStrip();renderSidebar();}
function toggleAxD(id){S.openDef=S.openDef===id?null:id;renderAxisStrip();}
function closeAxD(){S.openDef=null;renderAxisStrip();}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='<div style="padding:.6rem 0">';
  ERAS.forEach((era,ei)=>{
    const ea=(S.page==='era'||S.page==='map')&&S.eraId===era.id;
    const sm=ea||S.cmpMode;
    h+='<div class="era-row'+(ea?' active':'')+'" style="--era-hue:'+era.hue+'" onclick="handleEraSb(''+era.id+'')"><div style="display:flex;justify-content:space-between"><span class="era-tag" style="color:'+era.hue+'">'+esc(era.label)+'</span><span class="era-ct">'+era.maps.length+'</span></div><div class="era-yrs">'+esc(era.years)+'</div><div class="era-th">'+esc(era.thesis)+'</div></div>';
    if(sm)era.maps.forEach((map,mi)=>{
      const ma=S.page==='map'&&S.eraId===era.id&&S.mapIdx===mi;
      const ca=S.cmpA&&S.cmpA.name===map.name;
      const sc=S.axFilter?map.axes[S.axFilter]:null;
      h+='<div class="map-row'+(ma?' active':'')+(ca?' cmp-a':'')+'" style="--era-hue:'+era.hue+'" onclick="handleMapSb(''+era.id+'','+mi+')"><div style="min-width:0"><div class="map-nm">'+esc(map.name)+'</div><div class="map-mt">'+esc(map.year)+' · '+esc(map.region)+'</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-left:.4rem">'+(ca?'<span class="cmp-badge">A</span>':'')+(sc!=null?'<span class="ax-sc" style="color:'+era.hue+'">'+sc+'/5</span>':'')+'</div></div>';
    });
    if(ei<ERAS.length-1)h+='<div class="connector"></div>';
  });
  h+='</div>';sb.innerHTML=h;
}
function handleEraSb(id){if(S.cmpMode)return;nav('era',id);}
function handleMapSb(eraId,mi){
  const era=g(eraId);const map=era.maps[mi];
  if(S.cmpMode){selCmp(map);return;}
  nav('map',eraId,mi);
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('mob-bd').classList.remove('show');
}

function renderRadar(axes,color,size){
  const cx=size/2,cy=size/2,r=size*.35,n=AXES.length;
  const ang=i=>(Math.PI*2*i)/n-Math.PI/2;
  const pt=(i,f)=>[cx+r*f*Math.cos(ang(i)),cy+r*f*Math.sin(ang(i))];
  const gp=f=>AXES.map((_,i)=>pt(i,f).join(',')).join(' ');
  const vp=AXES.map((ax,i)=>pt(i,(axes[ax.id]||0)/5).join(',')).join(' ');
  let s='<svg width="'+size+'" height="'+size+'" style="overflow:visible;flex-shrink:0">';
  [.33,.66,1].forEach(f=>s+='<polygon points="'+gp(f)+'" fill="none" stroke="#2A2418" stroke-width=".5"/>');
  AXES.forEach((_,i)=>{const[x,y]=pt(i,1);s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="#2A2418" stroke-width=".5"/>';});
  AXES.forEach((ax,i)=>{const[x,y]=pt(i,1.3);s+='<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="middle" style="font-size:7px;fill:#6A5830;font-family:inherit">'+ax.icon+'</text>';});
  s+='<polygon points="'+vp+'" fill="'+color+'28" stroke="'+color+'" stroke-width="1.5"/></svg>';
  return s;
}
function renderTO(gained,sacrificed){
  return '<div class="tradeoff"><div class="to-col"><div class="to-lbl" style="color:var(--green)">↑ Gained</div>'+gained.map(g=>'<span class="pill pill-g"><span style="opacity:.6">↑</span>'+esc(g)+'</span>').join('')+'</div><div class="to-col"><div class="to-lbl" style="color:var(--red)">↓ Sacrificed</div>'+sacrificed.map(s=>'<span class="pill pill-s"><span style="opacity:.6">↓</span>'+esc(s)+'</span>').join('')+'</div></div>';
}
function renderStaticText(text){
  if(!text)return '';
  return '<div class="static-text">'+text.split('\n\n').filter(Boolean).map(p=>'<p>'+esc(p)+'</p>').join('')+'</div>';
}
function toggleInlineDef(id){
  S.openInline=S.openInline===id?null:id;
  const area=document.getElementById('idef-area');
  if(!area)return;
  if(!S.openInline){area.innerHTML='';return;}
  const ax=AXES.find(a=>a.id===S.openInline);const def=AXIS_DEFS[S.openInline];
  area.innerHTML='<div class="inline-def"><div class="idef-lbl">'+ax.icon+' '+esc(ax.label)+'</div><p class="idef-p">'+esc(def.what)+'</p><p class="idef-ten"><strong style="font-style:normal;color:var(--faint)">Key tension:</strong> '+esc(def.tension)+'</p><div class="idef-rub">'+def.rubric.map(r=>'<div class="idef-ri"><span class="idef-rs">'+r.score+' — '+r.label+':</span> '+esc(r.desc)+'</div>').join('')+'</div></div>';
}

const TENSIONS=[
  {gain:'Accuracy',loss:'Usability',ex:'Ptolemy grid vs portolan charts'},
  {gain:'Navigation',loss:'Symbolism',ex:'Portolans vs Hereford Mappa Mundi'},
  {gain:'Completeness',loss:'Honest blank space',ex:'Fra Mauro vs earlier mappae mundi'},
  {gain:'Road network',loss:'Geographic shape',ex:'Peutinger Table vs spatial maps'},
  {gain:'New World claim',loss:'Indigenous geography',ex:'Waldseemüller vs Piri Reis'},
  {gain:'Political framing',loss:'Physical geography',ex:'Al-Balkhi KMMS vs Al-Idrisi'},
  {gain:'Non-Eurocentric view',loss:'European recognition',ex:'Kangnido vs Fra Mauro'},
  {gain:'Tactile navigation',loss:'Visual readability',ex:'Stick Charts vs Cook charts'},
  {gain:'Data as tragedy',loss:'Geographic accuracy',ex:"Minard vs survey maps"},
  {gain:'Social insight',loss:'Objectivity',ex:"Booth's Poverty Map vs USGS"},
  {gain:'Equal-area',loss:'Shape truth',ex:'Peters vs Mercator'},
  {gain:'Real-time nav',loss:'Spatial memory',ex:'Google Maps vs wayfinding'},
];

function render(){
  const main=document.getElementById('main');
  const totalMaps=ERAS.reduce((n,e)=>n+e.maps.length,0);

  if(S.page==='home'){
    let h='<div class="page"><div class="pg-lbl">A Scholar's Companion</div><h1 style="font-weight:normal;font-size:clamp(1.3rem,3.5vw,2rem);color:var(--gold);margin-bottom:.4rem;line-height:1.2">Progress is a lie<br>maps tell about themselves.</h1><p style="font-size:.88rem;color:var(--faint);font-style:italic;margin-bottom:1.8rem;line-height:1.75">Every map that replaced another gained something and sacrificed something. '+totalMaps+' maps across '+ERAS.length+' eras.</p><div class="era-cards">';
    ERAS.forEach(era=>{h+='<div class="era-card" style="border-left:2px solid '+era.hue+'30" onmouseover="this.style.background=''+era.hue+'14'" onmouseout="this.style.background=''" onclick="nav('era',''+era.id+'')"><div style="font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:'+era.hue+';margin-bottom:.2rem">'+esc(era.label)+'</div><div style="font-size:.63rem;color:var(--vfaint);font-style:italic;margin-bottom:.3rem">'+esc(era.years)+'</div><div style="font-size:.65rem;color:var(--faint)">'+era.maps.length+' maps</div></div>';});
    h+='</div><div class="pg-lbl" style="margin-bottom:.6rem">The recurring trade-offs</div><div class="ten-grid">';
    TENSIONS.forEach(t=>{h+='<div class="ten-cell"><div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.2rem"><span class="t-g">↑ '+esc(t.gain)+'</span><span style="font-size:.6rem;color:var(--vfaint)">vs</span><span class="t-l">↓ '+esc(t.loss)+'</span></div><div class="t-ex">'+esc(t.ex)+'</div></div>';});
    h+='</div><p style="font-size:.77rem;color:var(--vfaint);line-height:1.8">Select an era or map from the sidebar. Use <strong style="color:var(--teal)">&#8644; Compare</strong> to analyse any two maps side by side.</p></div>';
    main.innerHTML=h;

  }else if(S.page==='era'){
    const era=g(S.eraId);if(!era){nav('home');return;}
    let h='<div class="page"><div class="pg-lbl" style="color:'+era.hue+'">Era Overview</div><h2 class="pg-title">'+esc(era.label)+' Cartography</h2><div class="pg-sub">'+esc(era.years)+'</div><p class="thesis">'+esc(era.thesis)+'</p>'+renderTO(era.gained,era.sacrificed)+'<div class="divider" style="background:linear-gradient(to right,'+era.hue+'50,transparent)"></div>'+renderStaticText(ERA_TEXT[era.id])+'<div style="height:1.8rem"></div><div class="pg-lbl">'+era.maps.length+' maps in this era</div><div class="map-grid">';
    era.maps.forEach((map,mi)=>{h+='<div class="map-card" style="border-left-color:'+era.hue+'35" onmouseover="this.style.background=''+era.hue+'12'" onmouseout="this.style.background=''" onclick="nav('map',''+era.id+'','+mi+')"><div style="font-size:.75rem;color:var(--text);line-height:1.3;margin-bottom:.18rem">'+esc(map.name)+'</div><div style="font-size:.6rem;color:var(--vfaint);font-style:italic">'+esc(map.year)+' · '+esc(map.region)+'</div></div>';});
    h+='</div></div>';main.innerHTML=h;

  }else if(S.page==='map'){
    const era=g(S.eraId);const map=era&&era.maps[S.mapIdx];if(!era||!map){nav('home');return;}
    const sz=96;
    let h='<div class="page"><div class="pg-lbl" style="color:'+era.hue+'">'+esc(era.label)+' · Map '+(S.mapIdx+1)+' of '+era.maps.length+'</div><h2 class="pg-title">'+esc(map.name)+'</h2><div class="pg-sub">'+esc(map.year)+' · '+esc(map.region)+'</div><div class="radar-wrap">'+renderRadar(map.axes,era.hue,sz)+'<div class="axes-list">'+AXES.map(ax=>{const v=map.axes[ax.id]||0;const op=S.openInline===ax.id;return '<div class="ax-row"><button class="ax-nb'+(op?' open':'')+'" onclick="toggleInlineDef(''+ax.id+'')">'+esc(ax.label)+'</button><div class="ax-dots">'+[1,2,3,4,5].map(i=>'<div class="adot" style="background:'+(i<=v?era.hue:'#1E1A14')+';border:1px solid '+(i<=v?era.hue+'80':'#2A2418')+'"></div>').join('')+'</div><span style="font-size:.57rem;color:var(--vfaint)">'+v+'/5</span></div>';}).join('')+'<div class="ax-hint">Click any label to define ↑</div></div></div><div id="idef-area"></div>'+renderTO(map.gained,map.sacrificed)+'<div class="divider" style="background:linear-gradient(to right,'+era.hue+'50,transparent)"></div>'+renderStaticText(MAP_TEXT[map.name])+'<div class="nav-btns"><button class="btn btn-ghost" onclick="nav('map',''+era.id+'','+(S.mapIdx-1)+')"'+(S.mapIdx===0?' disabled':'')+'>&#8592; Prev</button><button class="btn btn-ghost" onclick="nav('map',''+era.id+'','+(S.mapIdx+1)+')"'+(S.mapIdx===era.maps.length-1?' disabled':'')+'>Next &#8594;</button><div style="flex:1"></div><button class="btn btn-teal" onclick="startCmpFrom(''+map.name.replace(/'/g,"\'")+'')">⇄ Compare this map</button></div></div>';
    main.innerHTML=h;

  }else if(S.page==='compare'){
    const a=S.cmpA,b=S.cmpB;if(!a||!b){nav('home');return;}
    const ea=gEraForMap(a.name),eb=gEraForMap(b.name);
    let h='<div class="page-wide"><div class="pg-lbl" style="color:var(--teal)">Trade-off Comparison</div><h2 style="font-weight:normal;font-size:1.35rem;color:var(--text);margin-bottom:1.4rem;line-height:1.3">'+esc(a.name)+' <span style="color:var(--vfaint);font-size:1rem">vs</span> '+esc(b.name)+'</h2><div class="cmp-cards">'+[{m:a,e:ea},{m:b,e:eb}].map(({m,e})=>'<div class="cmp-card" style="border:1px solid '+e.hue+'30;background:'+e.hue+'08"><div style="font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:'+e.hue+';margin-bottom:.25rem">'+esc(e.label)+'</div><div style="font-size:.88rem;color:var(--text);margin-bottom:.18rem">'+esc(m.name)+'</div><div style="font-size:.62rem;color:var(--vfaint);font-style:italic;margin-bottom:.8rem">'+esc(m.year)+'</div>'+renderRadar(m.axes,e.hue,80)+'</div>').join('')+'</div><div style="margin-bottom:1.2rem"><div class="pg-lbl" style="margin-bottom:.55rem">Axis by axis</div>'+AXES.map(ax=>{const va=a.axes[ax.id]||0,vb=b.axes[ax.id]||0,diff=vb-va;return '<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.42rem"><span style="font-size:.58rem;color:var(--faint);width:90px;text-align:right;letter-spacing:.04em">'+ax.label+'</span><div style="display:flex;gap:3px">'+[1,2,3,4,5].map(i=>'<div style="width:9px;height:9px;border-radius:1px;background:'+(i<=va?ea.hue:'#1E1A14')+';border:1px solid '+(i<=va?ea.hue+'80':'#2A2418')+'"></div>').join('')+'</div><span style="font-size:.62rem;color:var(--vfaint);width:1.2rem;text-align:center">vs</span><div style="display:flex;gap:3px">'+[1,2,3,4,5].map(i=>'<div style="width:9px;height:9px;border-radius:1px;background:'+(i<=vb?eb.hue:'#1E1A14')+';border:1px solid '+(i<=vb?eb.hue+'80':'#2A2418')+'"></div>').join('')+'</div>'+(diff!==0?'<span class="'+(diff>0?'dp':'dn')+'">'+(diff>0?'+':'')+diff+'</span>':'')+'</div>';}).join('')+'</div>';

    // Comparison text: look for stored text, or compose from both map texts
    const keyA=a.name, keyB=b.name;
    const tA=MAP_TEXT[keyA]||'', tB=MAP_TEXT[keyB]||'';
    const cmpText='These two maps represent sharply different answers to the question of what a map is for.\n\n'+
      esc(a.name)+' ('+esc(a.year)+', '+esc(a.region)+') — '+tA.split('\n\n')[0]+'\n\n'+
      esc(b.name)+' ('+esc(b.year)+', '+esc(b.region)+') — '+tB.split('\n\n')[0]+'\n\n'+
      'The axis comparison above makes the trade-off visible. Where one scores high, the other often scores low — not because one is better designed, but because they were made for entirely different purposes, by different cultures, in response to different needs. The history of cartography is not the story of maps getting progressively better. It is the story of different societies choosing different trade-offs, and calling their choice a map.';

    h+='<div class="divider" style="background:linear-gradient(to right,var(--teal),transparent)"></div>'+renderStaticText(cmpText)+'<div class="nav-btns"><button class="btn btn-teal" onclick="resetCmp()">⇄ New comparison</button></div></div>';
    main.innerHTML=h;
  }
  renderSidebar();
}

function toggleMob(){
  document.getElementById('sidebar').classList.toggle('mob-open');
  document.getElementById('mob-bd').classList.toggle('show');
}

renderAxisStrip();renderCmpUI();render();
</script>
</body>
</html>
