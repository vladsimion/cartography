<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cartography Explorer | Full Edition</title>
<style>
    :root { --bg: #0A0806; --text: #D8CDB0; --accent: #C8A96E; --border: #1E1A12; --dim: #5A4A28; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: Georgia, serif; display:flex; height:100vh; overflow:hidden; }
    #sidebar { width:320px; border-right:1px solid var(--border); overflow-y:auto; background: #0d0b08; }
    #main { flex:1; overflow-y:auto; padding:40px; }
    
    .era-nav { padding: 15px; background: #14110d; border-bottom: 1px solid var(--border); cursor: pointer; }
    .era-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
    .map-nav { padding: 10px 25px; cursor: pointer; font-size: 0.85em; border-bottom: 1px solid #14100A; transition: 0.2s; }
    .map-nav:hover { background: #1a150e; color: #fff; }
    .map-nav.active { background: #231d14; border-left: 3px solid var(--accent); }

    .pill { display:inline-block; padding:5px 10px; margin:4px; font-size:0.75em; border-radius: 2px; }
    .gain { background:#1A2A18; color:#88BB78; border: 1px solid #2d452a; }
    .loss { background:#2A1A18; color:#CC7755; border: 1px solid #4a2a24; }
    
    .stats-grid { display: grid; grid-template-columns: 120px 1fr; gap: 15px; align-items: center; margin: 20px 0; }
    .bar-container { display:flex; gap:3px; }
    .bar-segment { width:15px; height:8px; background:#1E1A14; }
    .bar-segment.on { background:var(--accent); }
    
    .compare-box { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    button { background:var(--accent); color: #000; border:none; padding:8px 15px; cursor:pointer; font-weight:bold; }
    button.alt { background: transparent; border: 1px solid #5AABAB; color: #5AABAB; }
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
    <div id="compare-ui"></div>
    <div id="content-body">
        <h1 style="color:var(--accent)">Cartography & Trade-offs</h1>
        <p style="color:var(--dim); font-style: italic;">The history of mapping is not a steady march toward "truth," but a series of tactical sacrifices.</p>
        <p>Select a map from the sidebar to explore its specific gains and losses.</p>
    </div>
</div>

<script>
// --- DATA (Full ERAS structure) ---
const AXES = [
  { id: "accuracy", label: "Accuracy" }, { id: "usability", label: "Usability" },
  { id: "navigation", label: "Navigation" }, { id: "symbolism", label: "Symbolism" },
  { id: "politics", label: "Politics" }, { id: "completeness", label: "Completeness" },
  { id: "richness", label: "Richness" }
];

const ERAS = [
  {
    id: "ancient", label: "Ancient", years: "6200 BCE – 400 CE", hue: "#C8A96E",
    maps: [
      { name: "Çatalhöyük Wall Painting", year: "c. 6200 BCE", region: "Anatolia", axes: { accuracy: 1, usability: 2, navigation: 1, symbolism: 5, politics: 2, completeness: 1, richness: 4 }, gained: ["First spatial representation"], sacrificed: ["Scale accuracy"] },
      { name: "Babylonian World Map", year: "c. 600 BCE", region: "Mesopotamia", axes: { accuracy: 1, usability: 2, navigation: 1, symbolism: 5, politics: 5, completeness: 1, richness: 3 }, gained: ["Cosmological framing"], sacrificed: ["Geographic truth"] },
      { name: "Eratosthenes' World Map", year: "c. 194 BCE", region: "Alexandria", axes: { accuracy: 4, usability: 2, navigation: 2, symbolism: 1, politics: 1, completeness: 2, richness: 2 }, gained: ["Calculated Earth circumference"], sacrificed: ["Navigational readability"] },
      { name: "Ptolemy's World Map", year: "c. 150 CE", region: "Roman Egypt", axes: { accuracy: 4, usability: 2, navigation: 2, symbolism: 2, politics: 3, completeness: 3, richness: 2 }, gained: ["Latitude/Longitude system"], sacrificed: ["Navigational utility"] }
    ]
  },
  {
    id: "medieval", label: "Medieval", years: "400 – 1450 CE", hue: "#7B9E6B",
    maps: [
      { name: "T-O Map", year: "c. 600 CE", region: "Europe", axes: { accuracy: 1, usability: 3, navigation: 1, symbolism: 5, politics: 5, completeness: 2, richness: 2 }, gained: ["Symbolic clarity"], sacrificed: ["All accuracy"] },
      { name: "Al-Idrisi's Tabula Rogeriana", year: "1154 CE", region: "Sicily", axes: { accuracy: 4, usability: 3, navigation: 3, symbolism: 3, politics: 3, completeness: 3, richness: 4 }, gained: ["East-West synthesis"], sacrificed: ["Christian framing"] },
      { name: "Hereford Mappa Mundi", year: "c. 1300 CE", region: "England", axes: { accuracy: 1, usability: 1, navigation: 1, symbolism: 5, politics: 4, completeness: 4, richness: 5 }, gained: ["Visual encyclopedia"], sacrificed: ["Practical use"] },
      { name: "Portolan Charts", year: "c. 1300 CE", region: "Mediterranean", axes: { accuracy: 4, usability: 5, navigation: 5, symbolism: 1, politics: 2, completeness: 2, richness: 2 }, gained: ["Compass rhumb lines"], sacrificed: ["Interior detail"] }
    ]
  },
  {
    id: "modern", label: "Modern", years: "1800 – 1970 CE", hue: "#C47A5A",
    maps: [
      { name: "Minard's Napoleon Map", year: "1869", region: "France", axes: { accuracy: 4, usability: 4, navigation: 1, symbolism: 5, politics: 4, completeness: 3, richness: 5 }, gained: ["Flow visualization"], sacrificed: ["Geographic truth"] },
      { name: "Snow's Cholera Map", year: "1854", region: "London", axes: { accuracy: 4, usability: 5, navigation: 1, symbolism: 2, politics: 2, completeness: 3, richness: 3 }, gained: ["Epidemiology"], sacrificed: ["Aesthetic tradition"] },
      { name: "Beck's Tube Map", year: "1933", region: "London", axes: { accuracy: 1, usability: 5, navigation: 5, symbolism: 3, politics: 1, completeness: 2, richness: 2 }, gained: ["Topological clarity"], sacrificed: ["Physical accuracy"] }
    ]
  }
];

// --- APP STATE ---
let selectedMap = null;
let compareMode = false;
let compA = null;

function init() {
    renderSidebar();
}

function renderSidebar() {
    const sb = document.getElementById("sidebar");
    sb.innerHTML = `<div style="padding:20px; border-bottom:1px solid var(--border)">
        <button class="alt" onclick="toggleCompare()">${compareMode ? 'Cancel Compare' : '⇄ Compare Mode'}</button>
    </div>`;
    
    ERAS.forEach(era => {
        const eraEl = document.createElement("div");
        eraEl.className = "era-nav";
        eraEl.innerHTML = `<div class="era-label">${era.label}</div><div style="font-size:0.7em; color:var(--dim)">${era.years}</div>`;
        sb.appendChild(eraEl);

        era.maps.forEach(map => {
            const mEl = document.createElement("div");
            mEl.className = `map-nav ${selectedMap?.name === map.name ? 'active' : ''}`;
            mEl.innerText = map.name;
            mEl.onclick = () => selectMap(map, era);
            sb.appendChild(mEl);
        });
    });
}

function toggleCompare() {
    compareMode = !compareMode;
    compA = null;
    document.getElementById("compare-ui").innerHTML = compareMode ? 
        `<div class="compare-box"><span>Mode: Select First Map</span></div>` : "";
    renderSidebar();
}

function selectMap(map, era) {
    if (compareMode) {
        if (!compA) {
            compA = map;
            document.getElementById("compare-ui").innerHTML = `<div class="compare-box"><span>Comparing: <b>${compA.name}</b> vs... (Select another)</span></div>`;
        } else {
            renderComparison(compA, map);
            compA = null;
        }
        return;
    }
    selectedMap = map;
    renderSidebar();
    renderMapDetail(map, era);
}

function renderMapDetail(map, era) {
    const body = document.getElementById("content-body");
    body.innerHTML = `
        <div style="color:${era.hue}; font-size:0.8rem; text-transform:uppercase">${era.label}</div>
        <h1 style="margin-top:0">${map.name}</h1>
        <div style="color:var(--dim); margin-bottom:30px">${map.year} | ${map.region}</div>
        
        <div style="display:flex; gap:40px">
            <div style="flex:1">
                <h3>Trade-offs</h3>
                <div style="margin-bottom:15px"><b style="color:#88BB78">↑ GAINED:</b><br>${map.gained.map(g => `<span class="pill gain">${g}</span>`).join('')}</div>
                <div><b style="color:#CC7755">↓ SACRIFICED:</b><br>${map.sacrificed.map(s => `<span class="pill loss">${s}</span>`).join('')}</div>
            </div>
            <div style="width:300px">
                <h3>Metrics</h3>
                ${AXES.map(ax => `
                    <div class="stats-grid">
                        <span style="font-size:0.8rem">${ax.label}</span>
                        <div class="bar-container">
                            ${[1,2,3,4,5].map(v => `<div class="bar-segment ${v <= map.axes[ax.id] ? 'on' : ''}"></div>`).join('')}
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

function renderComparison(a, b) {
    const body = document.getElementById("content-body");
    body.innerHTML = `
        <h2>Comparison</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
            <div style="border-right: 1px solid var(--border); padding-right:20px">
                <h3>${a.name}</h3>
                <p class="pill gain">↑ ${a.gained[0]}</p>
                <p class="pill loss">↓ ${a.sacrificed[0]}</p>
            </div>
            <div>
                <h3>${b.name}</h3>
                <p class="pill gain">↑ ${b.gained[0]}</p>
                <p class="pill loss">↓ ${b.sacrificed[0]}</p>
            </div>
        </div>
    `;
}

init();
</script>
</body>
</html>
