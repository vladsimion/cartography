<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography & Its Trade-offs</title>
<style>
:root{--bg:#0A0806;--bg-card:#0E0B07;--border:#1E1A12;--border-mid:#2A2418;--text:#E0D0A8;--muted:#A09060;--vfaint:#3A2E18;--gold:#C8A96E;--teal:#5AABAB}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,serif}
#app{display:flex;flex-direction:column;height:100vh}
#header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
#body{display:flex;flex:1;min-height:0}
#sidebar{width:280px;border-right:1px solid var(--border);overflow:auto}
#main{flex:1;overflow:auto;padding:20px}
.row{padding:10px;border-bottom:1px solid #111;cursor:pointer}
.row:hover{background:#15120c}
.btn{border:1px solid var(--teal);color:var(--teal);padding:4px 10px;background:none;cursor:pointer}
.card{padding:10px;border:1px solid var(--border);margin-bottom:10px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>Cartography & Its Trade-offs</div>
    <button id="cmpBtn" class="btn">Compare</button>
  </div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="main"></div>
  </div>
</div>

<script>
// ================= DATA (shortened example, extend freely) =================
const ERAS=[
{ id:"ancient",label:"Ancient",maps:[
 {name:"Babylonian World Map",year:"600 BCE"},
 {name:"Ptolemy's World Map",year:"150 CE"}
]},
{ id:"modern",label:"Modern",maps:[
 {name:"Beck Underground Map",year:"1933"},
 {name:"Google Maps",year:"2005"}
]}
];

// ================= STATE =================
const S={page:"home",era:null,map:null,cmpMode:false,cmpA:null,cmpB:null};

// ================= DOM =================
const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");
const cmpBtn=document.getElementById("cmpBtn");

// ================= EVENTS =================
cmpBtn.addEventListener("click",()=>{
 S.cmpMode=!S.cmpMode;
 S.cmpA=null;S.cmpB=null;
 render();
});

// ================= RENDER SIDEBAR =================
function renderSidebar(){
 sidebar.innerHTML="";
 ERAS.forEach(era=>{
   const eraEl=document.createElement("div");
   eraEl.className="row";
   eraEl.textContent=era.label;
   eraEl.addEventListener("click",()=>{
     S.page="era";S.era=era.id;render();
   });
   sidebar.appendChild(eraEl);

   era.maps.forEach((m,i)=>{
     const mapEl=document.createElement("div");
     mapEl.className="row";
     mapEl.style.paddingLeft="20px";
     mapEl.textContent=m.name;
     mapEl.addEventListener("click",()=>{
       if(S.cmpMode){selectCompare(m);return;}
       S.page="map";S.era=era.id;S.map=i;render();
     });
     sidebar.appendChild(mapEl);
   });
 });
}

// ================= COMPARE =================
function selectCompare(map){
 if(!S.cmpA){S.cmpA=map;render();return;}
 if(!S.cmpB){S.cmpB=map;S.page="compare";S.cmpMode=false;render();}
}

// ================= RENDER =================
function render(){
 renderSidebar();
 main.innerHTML="";

 if(S.page==="home"){
   main.innerHTML="<h2>Select an era</h2>";
   return;
 }

 const era=ERAS.find(e=>e.id===S.era);
 if(!era)return;

 if(S.page==="era"){
   const h=document.createElement("h2");
   h.textContent=era.label;
   main.appendChild(h);

   era.maps.forEach((m,i)=>{
     const btn=document.createElement("button");
     btn.className="btn";
     btn.textContent=m.name;
     btn.addEventListener("click",()=>{
       S.page="map";S.map=i;render();
     });
     main.appendChild(btn);
   });
 }

 if(S.page==="map"){
   const m=era.maps[S.map];
   if(!m)return;

   const card=document.createElement("div");
   card.className="card";

   const title=document.createElement("h2");
   title.textContent=m.name;

   const year=document.createElement("p");
   year.textContent=m.year;

   const cmp=document.createElement("button");
   cmp.className="btn";
   cmp.textContent="Compare this";
   cmp.addEventListener("click",()=>{
     S.cmpMode=true;S.cmpA=m;render();
   });

   card.appendChild(title);
   card.appendChild(year);
   card.appendChild(cmp);
   main.appendChild(card);
 }

 if(S.page==="compare"){
   if(!S.cmpA||!S.cmpB){S.page="home";render();return;}

   const h=document.createElement("h2");
   h.textContent=S.cmpA.name+" vs "+S.cmpB.name;

   const a=document.createElement("div");
   a.className="card";
   a.textContent=S.cmpA.name+" ("+S.cmpA.year+")";

   const b=document.createElement("div");
   b.className="card";
   b.textContent=S.cmpB.name+" ("+S.cmpB.year+")";

   const reset=document.createElement("button");
   reset.className="btn";
   reset.textContent="New comparison";
   reset.addEventListener("click",()=>{
     S.page="home";S.cmpA=null;S.cmpB=null;render();
   });

   main.appendChild(h);
   main.appendChild(a);
   main.appendChild(b);
   main.appendChild(reset);
 }
}

// ================= INIT =================
render();
</script>
</body>
</html>
