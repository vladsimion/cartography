<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography — Production</title>
<style>
:root{--bg:#0A0806;--card:#111;--text:#E0D0A8;--muted:#888;--gold:#C8A96E}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
#app{display:flex;height:100vh}
#sidebar{width:280px;border-right:1px solid #222;overflow:auto}
#main{flex:1;padding:20px;overflow:auto}
.row{padding:10px;border-bottom:1px solid #111;cursor:pointer}
.row:hover{background:#15120c}
.card{background:var(--card);padding:12px;border:1px solid #222;margin-bottom:12px}
.btn{border:1px solid var(--gold);color:var(--gold);background:none;padding:6px 10px;cursor:pointer}
.header{font-size:20px;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main"></div>
</div>

<script>
// ===== AXES =====
const AXES=["accuracy","usability","navigation","symbolism","politics","completeness","richness"];

// ===== DATA (structure ready for full dataset) =====
const ERAS=[
{ id:"ancient",label:"Ancient",maps:[
 {name:"Babylonian World Map",year:"600 BCE",axes:{accuracy:1,usability:2,navigation:1,symbolism:5,politics:5,completeness:1,richness:3}},
 {name:"Ptolemy",year:"150 CE",axes:{accuracy:4,usability:2,navigation:2,symbolism:2,politics:3,completeness:3,richness:2}}
]},
{ id:"modern",label:"Modern",maps:[
 {name:"Beck Tube",year:"1933",axes:{accuracy:1,usability:5,navigation:5,symbolism:3,politics:1,completeness:2,richness:2}},
 {name:"Google Maps",year:"2005",axes:{accuracy:5,usability:5,navigation:5,symbolism:1,politics:4,completeness:4,richness:2}}
]}
];

// ===== STATE =====
const S={page:"home",era:null,map:null,cmp:false,a:null,b:null};

// ===== DOM =====
const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");

// ===== RADAR =====
function radar(data){
 const size=120,c=size/2,r=45;
 const pts=AXES.map((ax,i)=>{
  const ang=(Math.PI*2*i)/AXES.length-Math.PI/2;
  const val=(data[ax]||0)/5;
  return [c+r*val*Math.cos(ang),c+r*val*Math.sin(ang)].join(",");
 }).join(" ");
 return `<svg width="${size}" height="${size}">
  <polygon points="${pts}" fill="rgba(200,169,110,0.2)" stroke="${"#C8A96E"}"/>
 </svg>`;
}

// ===== SIDEBAR =====
function Sidebar(){
 sidebar.innerHTML="";
 ERAS.forEach(era=>{
  const e=document.createElement("div");
  e.className="row";
  e.textContent=era.label;
  e.addEventListener("click",()=>{S.page="era";S.era=era.id;render();});
  sidebar.appendChild(e);

  era.maps.forEach((m,i)=>{
   const el=document.createElement("div");
   el.className="row";
   el.style.paddingLeft="20px";
   el.textContent=m.name;
   el.addEventListener("click",()=>{
    if(S.cmp){cmpSelect(m);return;}
    S.page="map";S.era=era.id;S.map=i;render();
   });
   sidebar.appendChild(el);
  });
 });
}

// ===== COMPARE =====
function cmpSelect(m){
 if(!S.a){S.a=m;return;}
 if(!S.b){S.b=m;S.page="compare";S.cmp=false;render();}
}

// ===== VIEWS =====
function Home(){
 main.innerHTML="<div class='header'>Select an era</div>";
}

function EraView(era){
 main.innerHTML=`<div class='header'>${era.label}</div>`;
 era.maps.forEach((m,i)=>{
  const btn=document.createElement("button");
  btn.className="btn";
  btn.textContent=m.name;
  btn.addEventListener("click",()=>{S.page="map";S.map=i;render();});
  main.appendChild(btn);
 });
}

function MapView(era){
 const m=era.maps[S.map];
 const card=document.createElement("div");
 card.className="card";
 card.innerHTML=`<div class='header'>${m.name}</div><div>${m.year}</div>${radar(m.axes)}`;

 const cmp=document.createElement("button");
 cmp.className="btn";
 cmp.textContent="Compare";
 cmp.addEventListener("click",()=>{S.cmp=true;S.a=m;});

 card.appendChild(cmp);
 main.appendChild(card);
}

function CompareView(){
 main.innerHTML=`<div class='header'>${S.a.name} vs ${S.b.name}</div>`;

 [S.a,S.b].forEach(m=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`${m.name}${radar(m.axes)}`;
  main.appendChild(c);
 });

 const reset=document.createElement("button");
 reset.className="btn";
 reset.textContent="Reset";
 reset.addEventListener("click",()=>{S.page="home";S.a=null;S.b=null;render();});
 main.appendChild(reset);
}

// ===== RENDER =====
function render(){
 Sidebar();
 main.innerHTML="";

 if(S.page==="home") return Home();
 const era=ERAS.find(e=>e.id===S.era);
 if(!era) return Home();

 if(S.page==="era") return EraView(era);
 if(S.page==="map") return MapView(era);
 if(S.page==="compare") return CompareView();
}

render();
</script>
</body>
</html>
