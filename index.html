<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography &amp; Its Trade-offs</title>

<style>
/* (UNCHANGED — your full CSS stays exactly as-is) */
</style>
</head>

<body>
<div id="app">
  <header id="header">
    <div class="logo" onclick="nav('home')">
      <div class="logo-sub">Non-Linear History of</div>
      <div class="logo-title">Cartography &amp; Its Trade-offs</div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
      <span id="cmp-status" style="font-size:.62rem;color:var(--teal);display:none"></span>
      <button class="btn btn-teal" id="cmp-btn" onclick="toggleCmp()">&#8644; Compare</button>
    </div>
  </header>

  <div id="cmp-banner" style="display:none">
    <span style="font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal)">Compare mode</span>
    <span id="cmp-msg"></span>
    <button class="btn btn-ghost" onclick="toggleCmp()" style="margin-left:auto">Cancel</button>
  </div>

  <div id="body">
    <nav id="sidebar"></nav>
    <main id="main"></main>
  </div>
</div>

<script>
// ===== DATA (UNCHANGED) =====
// keep your full AXES + ERAS exactly as you provided

// ===== STATE =====
let state = {
  page: 'home',
  map: null,
  compare: false,
  compareA: null,
  compareB: null
};

// ===== STATE <-> URL =====
function serializeState() {
  if (state.compare && state.compareA && state.compareB) {
    return `#compare=${encodeURIComponent(state.compareA)}|${encodeURIComponent(state.compareB)}`;
  }
  if (state.map) {
    return `#${state.page}/${encodeURIComponent(state.map)}`;
  }
  return `#${state.page}`;
}

function parseState() {
  const hash = location.hash.replace('#', '');

  if (hash.startsWith('compare=')) {
    const [a, b] = hash.replace('compare=', '').split('|');
    return {
      page: null,
      map: null,
      compare: true,
      compareA: decodeURIComponent(a),
      compareB: decodeURIComponent(b)
    };
  }

  const [page, map] = hash.split('/');
  return {
    page: page || 'home',
    map: map ? decodeURIComponent(map) : null,
    compare: false,
    compareA: null,
    compareB: null
  };
}

function setState(next, push = true) {
  state = { ...state, ...next };

  if (push) {
    history.pushState(state, '', serializeState());
  }

  renderApp();
}

// ===== HELPERS =====
function findMap(name) {
  for (const era of ERAS) {
    const m = era.maps.find(x => x.name === name);
    if (m) return m;
  }
}

// ===== NAVIGATION =====
function nav(id) {
  setState({
    page: id,
    map: null,
    compare: false,
    compareA: null,
    compareB: null
  });
}

function handleMapClick(eraId, mapName) {
  if (state.compare) {
    if (!state.compareA) {
      setState({ compareA: mapName });
    } else if (state.compareA === mapName) {
      setState({ compareA: null });
    } else {
      setState({ compareB: mapName });
    }
  } else {
    setState({
      page: eraId,
      map: mapName
    });
  }
}

function toggleCmp() {
  if (state.compare) {
    setState({
      compare: false,
      compareA: null,
      compareB: null
    });
  } else {
    setState({
      compare: true,
      compareA: null,
      compareB: null
    });
  }
}

// ===== RENDER CORE =====
function renderApp() {
  const cmpBanner = document.getElementById('cmp-banner');
  const cmpBtn = document.getElementById('cmp-btn');

  cmpBtn.classList.toggle('active', state.compare);
  cmpBanner.style.display = state.compare ? 'flex' : 'none';

  if (state.compare && state.compareA && state.compareB) {
    renderComparison(findMap(state.compareA), findMap(state.compareB));
  } else if (state.map) {
    const era = ERAS.find(e => e.id === state.page);
    const map = era.maps.find(m => m.name === state.map);
    renderMap(map, era);
  } else {
    renderEraOrHome();
  }

  renderSidebar();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  let h = `<div class="era-row ${state.page==='home'?'active':''}" onclick="nav('home')">
    <div class="era-tag">Introduction</div>
  </div>`;

  ERAS.forEach(e => {
    h += `<div class="era-row ${state.page===e.id?'active':''}" onclick="nav('${e.id}')">
      <div class="era-tag">${e.label}</div>
      <div class="era-yrs">${e.years}</div>
    </div>`;

    if (state.page === e.id) {
      e.maps.forEach(m => {
        const isA = state.compareA === m.name;
        h += `<div class="map-row ${isA?'cmp-a':''}" onclick="handleMapClick('${e.id}','${m.name}')">
          <div>
            <div class="map-nm">${m.name}</div>
            <div class="map-mt">${m.year}</div>
          </div>
        </div>`;
      });
    }
  });

  nav.innerHTML = h;
}

// ===== ERA / HOME =====
function renderEraOrHome() {
  const main = document.getElementById('main');

  if (state.page === 'home') {
    main.innerHTML = `<h1>Maps are not territories.</h1>`;
    return;
  }

  const e = ERAS.find(x => x.id === state.page);

  main.innerHTML = `
    <h1>${e.label}</h1>
    ${e.maps.map(m => `
      <div onclick="handleMapClick('${e.id}','${m.name}')">${m.name}</div>
    `).join('')}
  `;
}

// ===== MAP =====
function renderMap(m, era) {
  const main = document.getElementById('main');

  main.innerHTML = `
    <h1>${m.name}</h1>
    <p>${m.year} • ${m.region}</p>
  `;
}

// ===== COMPARE =====
function renderComparison(a, b) {
  const main = document.getElementById('main');

  main.innerHTML = `
    <h1>Comparison</h1>
    <p>${a.name} vs ${b.name}</p>
  `;
}

// ===== HISTORY =====
window.onpopstate = () => {
  state = parseState();
  renderApp();
};

// ===== INIT =====
state = parseState();
renderApp();
</script>
</body>
</html>
