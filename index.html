<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography & Its Trade-offs</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#eee}
#app{display:flex;height:100vh}
#sidebar{width:260px;border-right:1px solid #333;overflow:auto}
#main{flex:1;padding:20px;overflow:auto}
button{cursor:pointer}
.map-row{padding:10px;border-bottom:1px solid #222}
.map-row:hover{background:#222}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main"></div>
</div>

<script>
// --- DATA (trimmed for clarity, keep your full dataset here) ---
const ERAS = [
  {
    id: "ancient",
    label: "Ancient",
    maps: [
      { name: "Babylonian World Map", year: "600 BCE" },
      { name: "Ptolemy's World Map", year: "150 CE" }
    ]
  }
];

// --- STATE ---
const state = {
  page: "home",
  eraId: null,
  mapIndex: null
};

// --- DOM ---
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");

// --- RENDER SIDEBAR ---
function renderSidebar() {
  sidebar.innerHTML = "";

  ERAS.forEach(era => {
    const eraDiv = document.createElement("div");
    eraDiv.textContent = era.label;
    eraDiv.style.padding = "10px";
    eraDiv.style.borderBottom = "1px solid #333";

    eraDiv.addEventListener("click", () => {
      state.page = "era";
      state.eraId = era.id;
      render();
    });

    sidebar.appendChild(eraDiv);

    era.maps.forEach((map, index) => {
      const mapDiv = document.createElement("div");
      mapDiv.className = "map-row";
      mapDiv.textContent = map.name;

      mapDiv.addEventListener("click", () => {
        state.page = "map";
        state.eraId = era.id;
        state.mapIndex = index;
        render();
      });

      sidebar.appendChild(mapDiv);
    });
  });
}

// --- RENDER MAIN ---
function render() {
  main.innerHTML = "";

  if (state.page === "home") {
    main.innerHTML = "<h1>Cartography App</h1><p>Select an era</p>";
    return;
  }

  const era = ERAS.find(e => e.id === state.eraId);
  if (!era) return;

  if (state.page === "era") {
    const title = document.createElement("h2");
    title.textContent = era.label;
    main.appendChild(title);

    era.maps.forEach((map, index) => {
      const btn = document.createElement("button");
      btn.textContent = map.name;

      btn.addEventListener("click", () => {
        state.page = "map";
        state.mapIndex = index;
        render();
      });

      main.appendChild(btn);
    });
  }

  if (state.page === "map") {
    const map = era.maps[state.mapIndex];
    if (!map) return;

    const title = document.createElement("h2");
    title.textContent = map.name;

    const year = document.createElement("p");
    year.textContent = map.year;

    const back = document.createElement("button");
    back.textContent = "Back";
    back.addEventListener("click", () => {
      state.page = "era";
      render();
    });

    main.appendChild(title);
    main.appendChild(year);
    main.appendChild(back);
  }
}

// --- INIT ---
renderSidebar();
render();
</script>
</body>
</html>
