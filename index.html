<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography — Final</title>
<style>
:root{--bg:#0A0806;--card:#111;--text:#E0D0A8;--muted:#888;--gold:#C8A96E;--green:#88BB78;--red:#CC7755}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
#app{display:flex;height:100vh}
#sidebar{width:300px;border-right:1px solid #222;overflow:auto}
#main{flex:1;padding:20px;overflow:auto}
.row{padding:10px;border-bottom:1px solid #111;cursor:pointer}
.row:hover{background:#15120c}
.card{background:var(--card);padding:14px;border:1px solid #222;margin-bottom:14px}
.btn{border:1px solid var(--gold);color:var(--gold);background:none;padding:6px 10px;cursor:pointer;margin-top:10px}
.header{font-size:22px;margin-bottom:10px}
.axis{cursor:pointer;color:var(--gold);margin-right:10px}
.panel{border:1px solid #333;padding:10px;margin:10px 0;background:#0f0c08}
.diff-pos{color:var(--green)}
.diff-neg{color:var(--red)}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main"></div>
</div>

<script>
// ===== AXES =====
const AXES=["accuracy","usability","navigation","symbolism","politics","completeness","richness"];

const AXIS_DEFS={
 accuracy:"Geometric correctness.",
 usability:"Ease of reading.",
 navigation:"Movement guidance.",
 symbolism:"Meaning beyond geography.",
 politics:"Power and claims.",
 completeness:"Scope.",
 richness:"Layered info."
};

// ===== FULL DATA (compressed representative — extendable) =====
const ERAS=[
{ id:"ancient",label:"Ancient",maps:[
 {name:"Babylonian World Map",year:"600 BCE",text:"Cosmological map.",axes:{accuracy:1,usability:2,navigation:1,symbolism:5,politics:5,completeness:1,richness:3}},
 {name:"Ptolemy",year:"150 CE",text:"Coordinate system.",axes:{accuracy:4,usability:2,navigation:2,symbolism:2,politics:3,completeness:3,richness:2}}
]},
{ id:"medieval",label:"Medieval",maps:[
 {name:"Hereford Mappa Mundi",year:"1300",text:"Symbolic world.",axes:{accuracy:1,usability:1,navigation:1,symbolism:5,politics:4,completeness:4,richness:5}}
]},
{ id:"modern",label:"Modern",maps:[
 {name:"Beck Tube",year:"1933",text:"Topological clarity.",axes:{accuracy:1,usability:5,navigation:5,symbolism:3,politics:1,completeness:2,richness:2}},
 {name:"Google Maps",year:"2005",text:"Real-time navigation.",axes:{accuracy:5,usability:5,navigation:5,symbolism:1,politics:4,completeness:4,richness:2}}
]}
];

// ===== STATE =====
const S={page:"home",era:null,map:null,cmp:false,a:null,b:null,axis:null};

const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");

// ===== RADAR =====
function radar(data){
 const size=140,c=size/2,r=50;
 const pts=AXES.map((ax,i)=>{
  const ang=(Math.PI*2*i)/AXES.length-Math.PI/2;
  const val=(data[ax]||0)/5;
  return [c+r*val*Math.cos(ang),c+r*val*Math.sin(ang)].join(",");
 }).join(" ");
 return `<svg width="${size}" height="${size}">
  <polygon points="${pts}" fill="rgba(200,169,110,0.2)" stroke="#C8A96E"/>
 </svg>`;
}

// ===== SIDEBAR =====
function Sidebar(){
 sidebar.innerHTML="";
 ERAS.forEach(era=>{
  const e=document.createElement("div");
  e.className="row";
  e.textContent=era.label;
  e.onclick=()=>{S.page="era";S.era=era.id;render();};
  sidebar.appendChild(e);

  era.maps.forEach((m,i)=>{
   const el=document.createElement("div");
   el.className="row";
   el.style.paddingLeft="20px";
   el.textContent=m.name;
   el.onclick=()=>{
    if(S.cmp){cmpSelect(m);return;}
    S.page="map";S.era=era.id;S.map=i;render();
   };
   sidebar.appendChild(el);
  });
 });
}

// ===== COMPARE =====
function cmpSelect(m){
 if(!S.a){S.a=m;return;}
 if(!S.b){S.b=m;S.page="compare";S.cmp=false;render();}
}

// ===== AXIS PANEL =====
function AxisPanel(){
 if(!S.axis) return "";
 return `<div class='panel'><strong>${S.axis}</strong><p>${AXIS_DEFS[S.axis]}</p></div>`;
}

// ===== VIEWS =====
function Home(){
 main.innerHTML="<div class='header'>Cartography Explorer</div><p>Select an era</p>";
}

function EraView(era){
 main.innerHTML=`<div class='header'>${era.label}</div>`;
}

function MapView(era){
 const m=era.maps[S.map];
 const axesHtml=AXES.map(ax=>`<span class='axis' data-ax='${ax}'>${ax}</span>`).join("");

 const card=document.createElement("div");
 card.className="card";
 card.innerHTML=`<div class='header'>${m.name}</div>
 <div>${m.year}</div>
 <p>${m.text}</p>
 ${radar(m.axes)}
 <div>${axesHtml}</div>
 ${AxisPanel()}`;

 card.querySelectorAll('.axis').forEach(el=>{
  el.onclick=()=>{S.axis=el.dataset.ax;render();};
 });

 const cmp=document.createElement("button");
 cmp.className="btn";
 cmp.textContent="Compare";
 cmp.onclick=()=>{S.cmp=true;S.a=m;};

 card.appendChild(cmp);
 main.appendChild(card);
}

function CompareView(){
 main.innerHTML=`<div class='header'>${S.a.name} vs ${S.b.name}</div>`;

 [S.a,S.b].forEach(m=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`<strong>${m.name}</strong>${radar(m.axes)}`;
  main.appendChild(c);
 });

 // ===== ANALYSIS =====
 const analysis=document.createElement("div");
 analysis.className="card";

 let html="<strong>Axis Differences</strong><br>";
 AXES.forEach(ax=>{
  const diff=(S.b.axes[ax]||0)-(S.a.axes[ax]||0);
  if(diff!==0){
    html+=`${ax}: <span class='${diff>0?"diff-pos":"diff-neg"}'>${diff>0?"+":""}${diff}</span><br>`;
  }
 });

 analysis.innerHTML=html;
 main.appendChild(analysis);

 const reset=document.createElement("button");
 reset.className="btn";
 reset.textContent="Reset";
 reset.onclick=()=>{S.page="home";S.a=null;S.b=null;render();};
 main.appendChild(reset);
}

// ===== RENDER =====
function render(){
 Sidebar();
 main.innerHTML="";

 if(S.page==="home") return Home();
 const era=ERAS.find(e=>e.id===S.era);
 if(!era) return Home();

 if(S.page==="era") return EraView(era);
 if(S.page==="map") return MapView(era);
 if(S.page==="compare") return CompareView();
}

render();
</script>
</body>
</html>
