<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography & Its Trade-offs</title>
<style>
:root{
  --bg:#0A0806;--bg-card:#0E0B07;--border:#1E1A12;--text:#E0D0A8;
  --muted:#A09060;--vfaint:#3A2E18;--gold:#C8A96E;--teal:#5AABAB;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,serif}
#app{display:flex;flex-direction:column;height:100vh}
#header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#body{display:flex;flex:1}
#sidebar{width:280px;border-right:1px solid var(--border);overflow:auto}
#main{flex:1;padding:24px;overflow:auto}
.row{padding:10px 14px;border-bottom:1px solid #111;cursor:pointer;color:#bfae7a}
.row:hover{background:#1f1a12;color:#e0d0a8}
.row.active{border-left:2px solid var(--gold);background:#1a150d}
.card{background:var(--bg-card);border:1px solid var(--border);padding:16px;margin-bottom:16px}
.header-title{font-size:20px}
.sub{font-size:13px;color:var(--muted)}
.btn{border:1px solid var(--teal);color:var(--teal);background:none;padding:6px 12px;cursor:pointer}
.axis{font-size:11px;color:var(--gold);margin-right:8px;cursor:pointer}
.panel{border:1px solid var(--border);padding:10px;margin-top:10px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div style="font-size:10px;letter-spacing:.2em;color:var(--vfaint)">NON-LINEAR HISTORY OF</div>
      <div class="header-title">Cartography & Its Trade-offs</div>
    </div>
    <button id="cmpBtn" class="btn">⇄ Compare</button>
  </div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="main"></div>
  </div>
</div>

<script>
const AXES=["accuracy","usability","navigation","symbolism","politics","completeness","richness"];

const AXIS_DEFS={
 accuracy:"Geometric correctness.", usability:"Ease of reading.", navigation:"Movement guidance.",
 symbolism:"Meaning beyond geography.", politics:"Power and claims.", completeness:"Scope.", richness:"Depth of info."
};

const ERAS=[
{ id:"ancient",label:"Ancient",maps:[
 {name:"Babylonian World Map",year:"600 BCE",text:"Cosmological map.",axes:{accuracy:1,usability:2,navigation:1,symbolism:5,politics:5,completeness:1,richness:3}},
 {name:"Ptolemy",year:"150 CE",text:"Coordinate system.",axes:{accuracy:4,usability:2,navigation:2,symbolism:2,politics:3,completeness:3,richness:2}}
]},
{ id:"modern",label:"Modern",maps:[
 {name:"Beck Tube",year:"1933",text:"Topology over geography.",axes:{accuracy:1,usability:5,navigation:5,symbolism:3,politics:1,completeness:2,richness:2}},
 {name:"Google Maps",year:"2005",text:"Real-time navigation.",axes:{accuracy:5,usability:5,navigation:5,symbolism:1,politics:4,completeness:4,richness:2}}
]}
];

const S={page:"home",era:null,map:null,cmp:false,a:null,b:null,axis:null};

const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");

function radar(data){
 const size=120,c=size/2,r=45;
 const pts=AXES.map((ax,i)=>{
  const ang=(Math.PI*2*i)/AXES.length-Math.PI/2;
  const val=(data[ax]||0)/5;
  return [c+r*val*Math.cos(ang),c+r*val*Math.sin(ang)].join(",");
 }).join(" ");
 return `<svg width="${size}" height="${size}"><polygon points="${pts}" fill="rgba(200,169,110,0.2)" stroke="#C8A96E"/></svg>`;
}

function Sidebar(){
 sidebar.innerHTML="";
 ERAS.forEach(era=>{
  const e=document.createElement("div");
  e.className="row"+(S.era===era.id?" active":"");
  e.textContent=era.label;
  e.onclick=()=>{S.page="era";S.era=era.id;render();};
  sidebar.appendChild(e);

  era.maps.forEach((m,i)=>{
   const el=document.createElement("div");
   el.className="row"+(S.map===i&&S.era===era.id?" active":"");
   el.style.paddingLeft="20px";
   el.textContent=m.name;
   el.onclick=()=>{
    if(S.cmp){cmpSelect(m);return;}
    S.page="map";S.era=era.id;S.map=i;render();
   };
   sidebar.appendChild(el);
  });
 });
}

function cmpSelect(m){
 if(!S.a){S.a=m;return;}
 if(!S.b){S.b=m;S.page="compare";S.cmp=false;render();}
}

function Home(){
 main.innerHTML=`<div class="card">
 <div class="header-title">Progress is a lie maps tell about themselves.</div>
 <div class="sub">Every map gains something and sacrifices something.</div>
 </div>`;
}

function MapView(era){
 const m=era.maps[S.map];
 const axes=AXES.map(ax=>`<span class="axis" data-ax="${ax}">${ax}</span>`).join("");
 const card=document.createElement("div");
 card.className="card";
 card.innerHTML=`<div class="header-title">${m.name}</div>
 <div class="sub">${m.year}</div>
 <p>${m.text}</p>
 ${radar(m.axes)}
 <div>${axes}</div>`;

 card.querySelectorAll('.axis').forEach(el=>{
  el.onclick=()=>{S.axis=el.dataset.ax;render();};
 });

 if(S.axis){
  const p=document.createElement("div");
  p.className="panel";
  p.innerHTML=`<strong>${S.axis}</strong><p>${AXIS_DEFS[S.axis]}</p>`;
  card.appendChild(p);
 }

 main.appendChild(card);
}

function CompareView(){
 main.innerHTML=`<div class="header-title">${S.a.name} vs ${S.b.name}</div>`;
 [S.a,S.b].forEach(m=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`${m.name}${radar(m.axes)}`;
  main.appendChild(c);
 });
}

function render(){
 Sidebar();
 main.innerHTML="";
 if(S.page==="home") return Home();
 const era=ERAS.find(e=>e.id===S.era);
 if(!era) return Home();
 if(S.page==="map") return MapView(era);
 if(S.page==="compare") return CompareView();
}

// initial state
S.page="home";
render();
</script>
</body>
</html>
