<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartography — Polished</title>
<style>
:root{--bg:#0A0806;--card:#111;--text:#E0D0A8;--muted:#9a8a5a;--gold:#C8A96E;--green:#88BB78;--red:#CC7755;--border:#1E1A12}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto}
#app{display:flex;height:100vh}
#sidebar{width:300px;border-right:1px solid var(--border);overflow:auto}
#main{flex:1;padding:20px;overflow:auto}
.row{padding:10px 12px;border-bottom:1px solid #111;cursor:pointer}
.row:hover{background:#15120c}
.row.active{background:#1a150d;border-left:2px solid var(--gold)}
.card{background:var(--card);padding:14px;border:1px solid var(--border);margin-bottom:14px;border-radius:6px}
.btn{border:1px solid var(--gold);color:var(--gold);background:none;padding:6px 10px;cursor:pointer;margin-top:10px;border-radius:4px}
.btn.secondary{border-color:#555;color:#aaa}
.header{font-size:22px;margin-bottom:6px}
.sub{color:var(--muted);font-size:13px;margin-bottom:10px}
.axis{cursor:pointer;color:var(--gold);margin-right:10px;font-size:12px}
.panel{border:1px solid #333;padding:10px;margin:10px 0;background:#0f0c08;border-radius:6px}
.badge{display:inline-block;padding:2px 6px;border:1px solid #333;border-radius:4px;font-size:11px;color:#c9b27a;margin-right:6px}
.diff-pos{color:var(--green)}
.diff-neg{color:var(--red)}
.kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.kv span{font-size:12px;color:#cbb98a}
.hr{height:1px;background:#1a140d;margin:12px 0}
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;left:0;top:18px;background:#0f0c08;border:1px solid #333;padding:6px 8px;border-radius:4px;font-size:11px;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main"></div>
</div>

<script>
// ===== AXES =====
const AXES=["accuracy","usability","navigation","symbolism","politics","completeness","richness"];

const AXIS_DEFS={
 accuracy:"Geometric correctness of space (shape, distance, position).",
 usability:"How quickly a non-expert can read and act on the map.",
 navigation:"Support for movement (routes, bearings, directions).",
 symbolism:"Meaning beyond geography (cosmology, ideology).",
 politics:"Explicit role in power, territory, or worldview enforcement.",
 completeness:"Breadth of coverage (local → global).",
 richness:"Density of layered information (cultural, ecological, historical)."
};

// ===== DATA (expand freely) =====
const ERAS=[
{ id:"ancient",label:"Ancient",maps:[
 {name:"Babylonian World Map",year:"600 BCE",text:"A cosmological diagram placing Babylon at the center of a mythic world.",axes:{accuracy:1,usability:2,navigation:1,symbolism:5,politics:5,completeness:1,richness:3}},
 {name:"Ptolemy",year:"150 CE",text:"Introduces coordinates and projection—systematic but error-prone at scale.",axes:{accuracy:4,usability:2,navigation:2,symbolism:2,politics:3,completeness:3,richness:2}}
]},
{ id:"medieval",label:"Medieval",maps:[
 {name:"Hereford Mappa Mundi",year:"1300",text:"An encyclopedic Christian worldview—Jerusalem centered, meaning over measurement.",axes:{accuracy:1,usability:1,navigation:1,symbolism:5,politics:4,completeness:4,richness:5}}
]},
{ id:"modern",label:"Modern",maps:[
 {name:"Beck Tube",year:"1933",text:"Topology over geography—clarity for commuters at the expense of spatial truth.",axes:{accuracy:1,usability:5,navigation:5,symbolism:3,politics:1,completeness:2,richness:2}},
 {name:"Google Maps",year:"2005",text:"Real-time navigation at global scale—precision and convenience with hidden trade-offs.",axes:{accuracy:5,usability:5,navigation:5,symbolism:1,politics:4,completeness:4,richness:2}}
]}
];

// ===== STATE =====
const S={page:"home",era:null,map:null,cmp:false,a:null,b:null,axis:null};

const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");

// ===== UTIL =====
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}

// ===== RADAR =====
function radar(data){
 const size=150,c=size/2,r=55;
 const pts=AXES.map((ax,i)=>{
  const ang=(Math.PI*2*i)/AXES.length-Math.PI/2;
  const val=clamp((data[ax]||0)/5,0,1);
  return [c+r*val*Math.cos(ang),c+r*val*Math.sin(ang)].join(",");
 }).join(" ");
 let grid="";
 [0.33,0.66,1].forEach(f=>{
   const g=AXES.map((_,i)=>{
     const ang=(Math.PI*2*i)/AXES.length-Math.PI/2;
     return [c+r*f*Math.cos(ang),c+r*f*Math.sin(ang)].join(",");
   }).join(" ");
   grid+=`<polygon points="${g}" fill="none" stroke="#2a2418" stroke-width="1"/>`;
 });
 return `<svg width="${size}" height="${size}">${grid}<polygon points="${pts}" fill="rgba(200,169,110,0.2)" stroke="#C8A96E"/></svg>`;
}

// ===== NARRATIVE INSIGHTS =====
function primaryTradeoff(axes){
 // pick highest and lowest
 const entries=AXES.map(k=>[k,axes[k]||0]);
 entries.sort((a,b)=>b[1]-a[1]);
 const high=entries[0];
 const low=entries[entries.length-1];
 if(high[1]-low[1]<2) return null; // weak signal
 return {gain:high[0],loss:low[0]};
}

function narrativeForMap(m){
 const t=primaryTradeoff(m.axes);
 if(!t) return "Balanced profile with no dominant trade-off.";
 return `Primarily optimizes <b>${t.gain}</b> at the expense of <b>${t.loss}</b>.`;
}

function compareNarrative(a,b){
 const diffs=AXES.map(ax=>[ax,(b.axes[ax]||0)-(a.axes[ax]||0)]);
 diffs.sort((x,y)=>Math.abs(y[1])-Math.abs(x[1]));
 const top=diffs.find(d=>d[1]!==0);
 if(!top) return "Profiles are effectively identical.";
 const dir=top[1]>0?"gains":"loses";
 return `${b.name} ${dir} <b>${top[0]}</b> relative to ${a.name} (${top[1]>0?"+":""}${top[1]}).`;
}

// ===== SIDEBAR =====
function Sidebar(){
 sidebar.innerHTML="";
 ERAS.forEach(era=>{
  const e=document.createElement("div");
  e.className="row"+(S.era===era.id?" active":"");
  e.textContent=era.label;
  e.addEventListener("click",()=>{S.page="era";S.era=era.id;S.map=null;render();});
  sidebar.appendChild(e);

  era.maps.forEach((m,i)=>{
   const el=document.createElement("div");
   el.className="row"+(S.page==="map"&&S.map===i&&S.era===era.id?" active":"");
   el.style.paddingLeft="20px";
   el.textContent=m.name;
   el.addEventListener("click",()=>{
    if(S.cmp){cmpSelect(m);return;}
    S.page="map";S.era=era.id;S.map=i;render();
   });
   sidebar.appendChild(el);
  });
 });
}

// ===== COMPARE =====
function cmpSelect(m){
 if(!S.a){S.a=m;return;}
 if(m===S.a) return;
 if(!S.b){S.b=m;S.page="compare";S.cmp=false;render();}
}

// ===== AXIS PANEL =====
function AxisPanel(){
 if(!S.axis) return "";
 return `<div class='panel'><strong>${S.axis}</strong><p>${AXIS_DEFS[S.axis]}</p></div>`;
}

// ===== VIEWS =====
function Home(){
 main.innerHTML=`<div class='header'>Cartography Explorer</div>
 <div class='sub'>Every map encodes trade-offs. Select an era or map.</div>`;
}

function EraView(era){
 main.innerHTML=`<div class='header'>${era.label}</div>
 <div class='sub'>${era.maps.length} maps</div>`;
}

function MapView(era){
 const m=era.maps[S.map];
 const axesHtml=AXES.map(ax=>`<span class='axis tooltip' data-ax='${ax}' data-tip='${AXIS_DEFS[ax]}'>${ax}</span>`).join("");

 const card=document.createElement("div");
 card.className="card";
 card.innerHTML=`
 <div class='header'>${m.name}</div>
 <div class='sub'>${m.year}</div>
 <p>${m.text}</p>
 <div class='hr'></div>
 <div style='display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap'>
   ${radar(m.axes)}
   <div>
     <div class='kv'>${AXES.map(ax=>`<span class='badge'>${ax}: ${m.axes[ax]||0}/5</span>`).join("")}</div>
     <div style='margin-top:10px'>${axesHtml}</div>
   </div>
 </div>
 ${AxisPanel()}
 <div class='panel'><strong>Insight</strong><p>${narrativeForMap(m)}</p></div>
 `;

 card.querySelectorAll('.axis').forEach(el=>{
  el.addEventListener('click',()=>{S.axis=el.dataset.ax;render();});
 });

 const cmp=document.createElement("button");
 cmp.className="btn";
 cmp.textContent="Compare";
 cmp.addEventListener("click",()=>{S.cmp=true;S.a=m;});

 const back=document.createElement("button");
 back.className="btn secondary";
 back.textContent="Back";
 back.addEventListener("click",()=>{S.page="era";render();});

 card.appendChild(cmp);
 card.appendChild(back);
 main.appendChild(card);
}

function CompareView(){
 main.innerHTML=`<div class='header'>${S.a.name} vs ${S.b.name}</div>`;

 const wrap=document.createElement('div');
 wrap.style.display='grid';
 wrap.style.gridTemplateColumns='1fr 1fr';
 wrap.style.gap='12px';

 [S.a,S.b].forEach(m=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`<strong>${m.name}</strong><div class='sub'>${m.year}</div>${radar(m.axes)}`;
  wrap.appendChild(c);
 });
 main.appendChild(wrap);

 // axis diffs
 const analysis=document.createElement("div");
 analysis.className="card";
 let html="<strong>Axis Differences</strong><div class='hr'></div>";
 AXES.forEach(ax=>{
  const diff=(S.b.axes[ax]||0)-(S.a.axes[ax]||0);
  if(diff!==0){
    html+=`<div>${ax}: <span class='${diff>0?"diff-pos":"diff-neg"}'>${diff>0?"+":""}${diff}</span></div>`;
  }
 });
 if(!html.includes('div>')) html+="<div>None</div>";
 analysis.innerHTML=html;
 main.appendChild(analysis);

 const narrative=document.createElement('div');
 narrative.className='card';
 narrative.innerHTML=`<strong>Summary</strong><div class='hr'></div><p>${compareNarrative(S.a,S.b)}</p>`;
 main.appendChild(narrative);

 const reset=document.createElement("button");
 reset.className="btn";
 reset.textContent="New comparison";
 reset.addEventListener("click",()=>{S.page="home";S.a=null;S.b=null;render();});
 main.appendChild(reset);
}

// ===== RENDER =====
function render(){
 Sidebar();
 main.innerHTML="";
 if(S.page==="home") return Home();
 const era=ERAS.find(e=>e.id===S.era);
 if(!era) return Home();
 if(S.page==="era") return EraView(era);
 if(S.page==="map") return MapView(era);
 if(S.page==="compare") return CompareView();
}

render();
</script>
</body>
</html>
