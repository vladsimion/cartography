<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cartography Explorer</title>
<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background:#0A0806;
  color:#D8CDB0;
  display:flex;
}
#sidebar {
  width:300px;
  border-right:1px solid #1E1A12;
  height:100vh;
  overflow:auto;
}
#main {
  flex:1;
  padding:20px;
}
.era {
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #1E1A12;
}
.map {
  padding:8px 20px;
  cursor:pointer;
  font-size:0.9em;
}
.map:hover, .era:hover {
  background:#1a140c;
}
h1,h2 { color:#E0D0A8; }
.pill {
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  font-size:0.75em;
}
.gain { background:#1A2A18; color:#88BB78; }
.loss { background:#2A1A18; color:#CC7755; }
.bar {
  display:flex;
  gap:2px;
}
.bar div {
  width:10px;
  height:10px;
  background:#1E1A14;
}
.bar .on {
  background:#C8A96E;
}
</style>
</head>
<body>

<div id="sidebar"></div>
<div id="main">
  <h1>Cartography Explorer</h1>
  <p>Select an era or map.</p>
</div>

<script>
const ERAS = [
  {
    id:"ancient",
    label:"Ancient",
    thesis:"Early maps prioritized symbolism over accuracy.",
    maps:[
      {
        name:"Babylonian World Map",
        year:"600 BCE",
        region:"Mesopotamia",
        gained:["Cosmology","Named regions"],
        sacrificed:["Accuracy","Navigation"],
        axes:{accuracy:1, usability:2, navigation:1}
      },
      {
        name:"Ptolemy's World Map",
        year:"150 CE",
        region:"Roman Egypt",
        gained:["Coordinates","Projection"],
        sacrificed:["Navigation usability"],
        axes:{accuracy:4, usability:2, navigation:2}
      }
    ]
  },
  {
    id:"modern",
    label:"Modern",
    thesis:"Modern maps split between precision and usability.",
    maps:[
      {
        name:"Beck's Tube Map",
        year:"1933",
        region:"London",
        gained:["Usability","Clarity"],
        sacrificed:["Geographic truth"],
        axes:{accuracy:1, usability:5, navigation:5}
      }
    ]
  }
];

function renderSidebar() {
  const el = document.getElementById("sidebar");
  el.innerHTML = "";

  ERAS.forEach(e => {
    const eraDiv = document.createElement("div");
    eraDiv.className = "era";
    eraDiv.innerText = e.label;
    eraDiv.onclick = () => showEra(e);
    el.appendChild(eraDiv);

    e.maps.forEach(m => {
      const mapDiv = document.createElement("div");
      mapDiv.className = "map";
      mapDiv.innerText = "– " + m.name;
      mapDiv.onclick = () => showMap(m,e);
      el.appendChild(mapDiv);
    });
  });
}

function showEra(e) {
  const main = document.getElementById("main");
  main.innerHTML = `
    <h2>${e.label}</h2>
    <p>${e.thesis}</p>
  `;
}

function bar(value) {
  let html = '<div class="bar">';
  for(let i=1;i<=5;i++){
    html += `<div class="${i<=value?'on':''}"></div>`;
  }
  html += '</div>';
  return html;
}

function showMap(m,e) {
  const main = document.getElementById("main");

  const gains = m.gained.map(g=>`<span class="pill gain">${g}</span>`).join("");
  const losses = m.sacrificed.map(s=>`<span class="pill loss">${s}</span>`).join("");

  main.innerHTML = `
    <h2>${m.name}</h2>
    <p>${m.year} · ${m.region}</p>

    <h3>Axes</h3>
    Accuracy ${bar(m.axes.accuracy || 0)}
    Usability ${bar(m.axes.usability || 0)}
    Navigation ${bar(m.axes.navigation || 0)}

    <h3>Gained</h3>
    ${gains}

    <h3>Sacrificed</h3>
    ${losses}
  `;
}

renderSidebar();
</script>

</body>
</html>
